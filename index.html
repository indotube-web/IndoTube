<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - INDOTUBE</title>
  <style>
    :root {
      --red: #FF0000;
      --yellow: #FFD700;
      --orange: #FF6600;
      --black: #0F0F0F;
      --black-soft: #1A1A1A;
      --black-light: #272727;
      --white: #FFFFFF;
      --text: #F1F1F1;
      --gray: #AAAAAA;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body {
      background: var(--black); color: var(--text);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; padding: 16px;
    }
    
    .login-container {
      width: 100%; max-width: 400px; background: var(--black-soft);
      border: 1px solid var(--black-light); border-radius: 16px;
      padding: 32px 24px; text-align: center;
    }
    
    .logo-section {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 12px;
    }
    .logo-icon svg { width: 40px; height: 40px; }
    .logo-text {
      font-size: 32px; font-weight: 700; letter-spacing: -1.5px;
      color: var(--yellow);
    }
    
    .tagline {
      font-size: 14px; color: var(--gray); margin-bottom: 32px;
    }
    
    .btn-google {
      width: 100%; background: var(--white); color: #000000;
      border: none; padding: 12px 16px; border-radius: 24px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      transition: background 0.2s;
    }
    .btn-google:hover { background: var(--white-soft); }
    .btn-google:disabled { background: var(--gray); cursor: not-allowed; }
    .btn-google svg { width: 18px; height: 18px; }
    
    .loading-text {
      margin-top: 16px; font-size: 13px; color: var(--orange); display: none;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo-section">
      <div class="logo-icon">
        <svg viewBox="0 0 32 32">
          <path d="M6 14 L12 20 L26 8" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="rotate(-90 16 16)"/>
        </svg>
      </div>
      <span class="logo-text">INDOTUBE</span>
    </div>
    <p class="tagline">Tempat Berbagi Video Kreatif Indonesia</p>
    
    <button class="btn-google" id="btnLogin">
      <svg viewBox="0 0 24 24">
        <path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.859-3.578-7.859-8s3.53-8 7.859-8c2.46 0 4.105 1.025 5.047 1.926l3.227-3.11C18.28 1.845 15.448 1 12.24 1 6.033 1 1 6.033 1 12.24s5.033 11.24 11.24 11.24c6.478 0 10.793-4.537 10.793-10.986 0-.746-.08-1.32-.176-1.709H12.24z"/>
      </svg>
      Masuk dengan Google
    </button>

    <div class="loading-text" id="loadingText">Menghubungkan ke server...</div>
  </div>

  <script type="module">
    // IMPORT SDK SESUAI STRUKTUR MODUL
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // CONFIG ASLI MILIKMU
    const firebaseConfig = {
      apiKey: "AIzaSyA-2eXiVvN43dmcNlMx9hQ4wOv8Kjdjfw8",
      authDomain: "indotube-c7eb4.firebaseapp.com",
      projectId: "indotube-c7eb4",
      storageBucket: "indotube-c7eb4.firebasestorage.app",
      messagingSenderId: "568433040739",
      appId: "1:568433040739:web:c9b32f3d807b07fa5f4756"
    };

    // INISIALISASI
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const btnLogin = document.getElementById('btnLogin');
    const loadingText = document.getElementById('loadingText');

    // CEK STATUS LOGIN AKTIF
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // Jika sudah login, langsung lempar ke beranda
        location.href = 'beranda.html';
      }
    });

    // PROSES LOGIN POPUP GOOGLE
    btnLogin.addEventListener('click', async () => {
      btnLogin.disabled = true;
      loadingText.style.display = 'block';

      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        // Referensi dokumen user di koleksi 'users' berdasarkan UID
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        // Jika user baru pertama kali login, buatkan data profil otomatis
        if (!userSnap.exists()) {
          // Membuat handle otomatis dari nama kecil tanpa spasi + angka acak
          const cleanName = user.displayName.toLowerCase().replace(/[^a-z0-9]/g, "");
          const randomNum = Math.floor(1000 + Math.random() * 9000);
          const generatedHandle = `${cleanName}${randomNum}`;

          await setDoc(userRef, {
            uid: user.uid,
            nama: user.displayName,
            handle: generatedHandle,
            email: user.email,
            pic: user.photoURL || "https://picsum.photos/seed/user/200/200",
            bio: "Halo! Saya pengguna baru INDOTUBE.",
            link: ""
          });
        }

        // Sukses, pindah halaman
        location.href = 'beranda.html';

      } catch (error) {
        console.error("Login gagal:", error);
        alert("Gagal masuk: " + error.message);
        btnLogin.disabled = false;
        loadingText.style.display = 'none';
      }
    });
  </script>
</body>
</html>
