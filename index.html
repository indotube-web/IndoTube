<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INDOTUBE</title>
  <style>
    :root {
      --black: #0F0F0F;
      --white: #FFFFFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #fireworks {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

  .content {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 60px;
    }

  .marquee {
      width: 100vw;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
    }
  .marquee-text {
      display: inline-block;
      font-size: 28px;
      font-weight: 700;
      color: var(--white);
      padding-left: 100%;
      animation: scroll 15s linear infinite;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

  .login-box {
      display: none;
    }
  .google-btn {
      background: var(--white);
      border: none;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(255,255,255,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
  .google-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 30px rgba(255,255,255,0.5);
    }
  .google-btn svg {
      width: 32px;
      height: 32px;
    }

    @media (max-width: 768px) {
    .marquee-text { font-size: 20px; }
    .google-btn { width: 56px; height: 56px; }
    .google-btn svg { width: 28px; height: 28px; }
    }
  </style>
</head>
<body>
  <canvas id="fireworks"></canvas>

  <div class="content">
    <div class="marquee">
      <div class="marquee-text">Selamat Datang di INDOTUBE - Karya Anak Bangsa - buatan INDONESIA</div>
    </div>

    <div class="login-box" id="loginBox">
      <button class="google-btn" id="googleLogin">
        <svg viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
      </button>
    </div>
  </div>

  <script type="module">
    // FIREBASE SDK
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js'
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js'
    // TAMBAHAN: Import Firestore untuk kelola database user
    import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js'

    // FIREBASE CONFIG PUNYA LU
    const firebaseConfig = {
      apiKey: "AIzaSyA-2eXiVvN43dmcNlMx9hQ4wOv8Kjdjfw8",
      authDomain: "indotube-c7eb4.firebaseapp.com",
      projectId: "indotube-c7eb4",
      storageBucket: "indotube-c7eb4.firebasestorage.app",
      messagingSenderId: "568433040739",
      appId: "1:568433040739:web:c9b32f3d807b07fa5f4756"
    };

    // INIT FIREBASE
    const app = initializeApp(firebaseConfig)
    const auth = getAuth(app)
    const db = getFirestore(app) // Tambahan: Init database
    const provider = new GoogleAuthProvider()

    // CEK STATUS LOGIN
    onAuthStateChanged(auth, (user) => {
      if (user) {
        location.href = 'beranda.html'
      } else {
        document.getElementById('loginBox').style.display = 'block'
      }
    })

    // LOGIN GOOGLE BENERAN + PENYIMPANAN DATA USER
    document.getElementById('googleLogin').addEventListener('click', () => {
      signInWithPopup(auth, provider)
      .then(async (result) => {
          const user = result.user;
          
          // Cek apakah user ini sudah terdaftar di koleksi 'users'
          const userRef = doc(db, "users", user.uid);
          const userSnap = await getDoc(userRef);
          
          // Jika dokumen belum ada, daftarkan data barunya ke Firestore
          if (!userSnap.exists()) {
            const cleanName = user.displayName.toLowerCase().replace(/[^a-z0-9]/g, "");
            const randomNum = Math.floor(1000 + Math.random() * 9000);
            const generatedHandle = `${cleanName}${randomNum}`;

            await setDoc(userRef, {
              uid: user.uid,
              nama: user.displayName,
              handle: generatedHandle,
              email: user.email,
              pic: user.photoURL || "https://picsum.photos/seed/user/200/200",
              bio: "Halo! Saya pengguna baru INDOTUBE.",
              link: ""
            });
          }
          
          location.href = 'beranda.html'
        })
      .catch((error) => {
          alert('Login gagal: ' + error.message)
        })
    })

    // FIREWORKS ANIMATION
    const canvas = document.getElementById('fireworks');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    class Firework {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height;
        this.sx = Math.random() * 3 - 1.5;
        this.sy = Math.random() * -3 - 8;
        this.size = Math.random() * 2 + 1;
        this.shouldExplode = false;
        this.hue = Math.random() * 360;
      }
      update() {
        if (this.sy >= -2 || this.y <= canvas.height * 0.3) {
          this.shouldExplode = true;
        } else {
          this.x += this.sx;
          this.y += this.sy;
          this.sy += 0.1;
        }
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${this.hue}, 100%, 50%)`;
        ctx.fill();
      }
    }

    class Particle {
      constructor(x, y, hue) {
        this.x = x;
        this.y = y;
        this.sx = Math.random() * 6 - 3;
        this.sy = Math.random() * 6 - 3;
        this.size = Math.random() * 2 + 0.5;
        this.hue = hue;
        this.alpha = 1;
        this.decay = Math.random() * 0.02 + 0.015;
      }
      update() {
        this.x += this.sx;
        this.y += this.sy;
        this.sy += 0.05;
        this.alpha -= this.decay;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${this.hue}, 100%, 50%)`;
        ctx.fill();
        ctx.restore();
      }
    }

    let fireworks = [];
    let particles = [];

    function animate() {
      ctx.fillStyle = 'rgba(15, 15, 15, 0.2)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      if (Math.random() < 0.05) {
        fireworks.push(new Firework());
      }
      for (let i = fireworks.length - 1; i >= 0; i--) {
        fireworks[i].update();
        fireworks[i].draw();
        if (fireworks[i].shouldExplode) {
          for (let j = 0; j < 50; j++) {
            particles.push(new Particle(fireworks[i].x, fireworks[i].y, fireworks[i].hue));
          }
          fireworks.splice(i, 1);
        }
      }
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].alpha <= 0) {
          particles.splice(i, 1);
        }
      }
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
