<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>INDOTUBE - Beranda</title>
  <style>
    :root {
      --merah: #FF0000;
      --kuning: #FFD700;
      --oranye: #FF6600;
      --hijau: #00C853;
      --biru: #2196F3;
      --hitam: #0F0F0F;
      --hitam-lembut: #1A1A1A;
      --putih: #FFFFFF;
      --abu: #AAAAAA;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: var(--hitam); color: var(--putih); }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 56px;
      background: var(--hitam);
      border-bottom: 1px solid #272727;
      position: sticky;
      top: 0;
      z-index: 100;
      overflow: hidden;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
      flex: 1;
    }
    .logo-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(-90deg);
      flex-shrink: 0;
      z-index: 3;
      cursor: default;
      transition: opacity 0.2s;
    }
    .logo-icon.owner { cursor: pointer; }
    .logo-icon.owner:hover { opacity: 0.8; }
    .logo-icon svg { width: 24px; height: 24px; }
    
    .logo-text {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -1px;
      position: absolute;
      left: 34px;
      animation: gantiWarna 15s infinite, jalanPelan 25s ease-in-out infinite;
      z-index: 1;
    }
    @keyframes gantiWarna {
      0%, 20% { color: var(--kuning); }
      20%, 40% { color: var(--merah); }
      40%, 60% { color: var(--biru); }
      60%, 80% { color: var(--hijau); }
      80%, 100% { color: var(--oranye); }
    }
    @keyframes jalanPelan {
      0%, 8% { transform: translateX(0); }
      42%, 58% { transform: translateX(calc(100vw - 280px)); }
      92%, 100% { transform: translateX(0); }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 2;
      background: var(--hitam);
      padding-left: 16px;
      position: relative;
    }
    .icon-search {
      width: 24px;
      height: 24px;
      fill: var(--putih);
      cursor: pointer;
    }
    .btn-upload {
      background: var(--merah);
      color: var(--putih);
      border: none;
      padding: 8px 16px;
      border-radius: 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-upload:hover { background: #cc0000; }
    .profile-pic {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #333;
      cursor: pointer;
      object-fit: cover;
    }

    .running-text {
      width: 100%;
      height: 40px;
      background: var(--hitam-lembut);
      border-bottom: 1px solid #272727;
      display: none;
      align-items: center;
      padding: 0 16px;
      font-size: 14px;
      font-weight: 700;
      overflow: hidden;
    }
    .running-text.show { display: flex; }
    .running-text span {
      white-space: nowrap;
      animation: marquee 20s linear infinite;
    }
    @keyframes marquee {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .video-card { cursor: pointer; }
    .video-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background: #272727;
      border-radius: 12px;
      object-fit: cover;
      margin-bottom: 12px;
    }
    .video-info { display: flex; gap: 12px; }
    .channel-pic {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
      object-fit: cover;
    }
    .video-details { flex: 1; }
    .video-title {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .video-meta {
      font-size: 13px;
      color: var(--abu);
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--abu);
    }

    /* OVERLAY VIDEO & LAPISAN SENTUH */
    .video-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .video-overlay.show { display: flex; }
    
    #overlayPlayerContainer {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #overlayPlayerContainer iframe {
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none; /* Meneruskan klik ke lapisan touch-layer */
    }
    .touch-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10000;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .video-grid { grid-template-columns: 1fr; }
      .header-right { gap: 12px; }
      .btn-upload { padding: 6px 12px; font-size: 13px; }
      @keyframes jalanPelan {
        0%, 8% { transform: translateX(0); }
        42%, 58% { transform: translateX(calc(100vw - 220px)); }
        92%, 100% { transform: translateX(0); }
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <div class="logo-icon" id="logoIcon">
        <svg viewBox="0 0 32 32">
          <path d="M6 14 L12 20 L26 8" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <span class="logo-text">INDOTUBE</span>
    </div>

    <div class="header-right">
      <svg class="icon-search" viewBox="0 0 24 24">
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <button class="btn-upload" id="btnUpload">Upload</button>
      <img src="https://ui-avatars.com/api/?name=User&background=333&color=fff" alt="Profile" class="profile-pic" id="profileBtn">
    </div>
  </header>

  <div class="running-text" id="runningTextContainer">
    <span id="runningTextContent"></span>
  </div>

  <main class="container">
    <div class="video-grid" id="videoGrid">
      <div class="loading">Memuat video...</div>
    </div>
  </main>

  <div class="video-overlay" id="videoOverlay">
    <div id="overlayPlayerContainer">
      <div id="overlayPlayer"></div>
    </div>
    <div class="touch-layer" id="touchLayer"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA-2eXiVvN43dmcNlMx9hQ4wOv8Kjdjfw8",
      authDomain: "indotube-c7eb4.firebaseapp.com",
      projectId: "indotube-c7eb4",
      storageBucket: "indotube-c7eb4.firebasestorage.app",
      messagingSenderId: "568433040739",
      appId: "1:568433040739:web:c9b32f3d807b07fa5f4756"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const logoIcon = document.getElementById('logoIcon');
    const profileBtn = document.getElementById('profileBtn');
    const runningTextContainer = document.getElementById('runningTextContainer');
    const runningTextContent = document.getElementById('runningTextContent');
    const videoGrid = document.getElementById('videoGrid');
    const videoOverlay = document.getElementById('videoOverlay');
    const touchLayer = document.getElementById('touchLayer');

    const ownerUID = 'OPcnqsU7hXQdfIKzijrXFpD1eom2';

    // Inisialisasi API YouTube Iframe
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    let ytPlayer = null;

    db.collection('config').doc('global').onSnapshot(doc => {
      const data = doc.data() || {};
      const text = data.runningText || null;
      const color = data.textColor || '#FFFFFF';

      if (text) {
        runningTextContent.textContent = text;
        runningTextContent.style.color = color;
        runningTextContainer.classList.add('show');
      } else {
        runningTextContainer.classList.remove('show');
        runningTextContent.textContent = '';
      }
    });

    auth.onAuthStateChanged(user => {
      if (user) {
        profileBtn.src = user.photoURL || 'https://ui-avatars.com/api/?name=User&background=333&color=fff';

        if (user.uid === ownerUID) {
          logoIcon.classList.add('owner');
          logoIcon.title = 'Panel Admin';
          logoIcon.onclick = () => {
            if (auth.currentUser && auth.currentUser.uid === ownerUID) {
              location.href = 'admin.html';
            }
          };
        }
      } else {
        location.href = 'index.html';
      }
    });

    profileBtn.onclick = () => { location.href = 'profil.html'; };
    document.getElementById('btnUpload').onclick = () => { location.href = 'upload.html'; };

    function formatAngka(num) {
      if (num >= 1000000000) return (num/1000000000).toFixed(1).replace('.0','') + ' Milyar';
      if (num >= 1000000) return (num/1000000).toFixed(1).replace('.0','') + 'jt';
      if (num >= 10000) return (num/1000).toFixed(1).replace('.0','') + 'rb';
      return num.toString();
    }

    function waktuLalu(timestamp) {
      if (!timestamp) return '';
      const now = new Date();
      const date = timestamp.toDate();
      const selisih = Math.floor((now - date) / 1000);

      if (selisih < 60) return 'Baru saja';
      if (selisih < 3600) return Math.floor(selisih/60) + ' menit lalu';
      if (selisih < 86400) return Math.floor(selisih/3600) + ' jam lalu';
      if (selisih < 604800) return Math.floor(selisih/86400) + ' hari lalu';
      if (selisih < 2592000) return Math.floor(selisih/604800) + ' minggu lalu';
      if (selisih < 31536000) return Math.floor(selisih/2592000) + ' bulan lalu';
      return Math.floor(selisih/31536000) + ' tahun lalu';
    }

    function getYoutubeId(url) {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    async function playFullscreen(videoDocId, youtubeLink) {
      const ytId = getYoutubeId(youtubeLink);
      if (!ytId) return;

      db.collection('videos').doc(videoDocId).update({
        views: firebase.firestore.FieldValue.increment(1)
      }).catch(()=>{});

      videoOverlay.classList.add('show');
      
      // Buat ulang elemen player
      document.getElementById('overlayPlayerContainer').innerHTML = '<div id="overlayPlayer"></div>';

      ytPlayer = new YT.Player('overlayPlayer', {
        videoId: ytId,
        playerVars: {
          'autoplay': 1,
          'playsinline': 1,
          'controls': 0, // Matikan kontrol asli YouTube
          'rel': 0,
          'modestbranding': 1,
          'disablekb': 1
        },
        events: {
          'onReady': async (event) => {
            event.target.playVideo();

            // Memaksa mode Fullscreen
            try {
              if (videoOverlay.requestFullscreen) {
                await videoOverlay.requestFullscreen();
              } else if (videoOverlay.webkitRequestFullscreen) {
                await videoOverlay.webkitRequestFullscreen();
              }
            } catch(err) { console.log('Fullscreen error:', err); }

            // Membuka kunci orientasi layar agar otomatis mengikuti sensor fisik perangkat
            try {
              if (screen.orientation && screen.orientation.unlock) {
                screen.orientation.unlock();
              }
            } catch(err) {}
          }
        }
      });
    }

    function closeOverlay() {
      videoOverlay.classList.remove('show');
      
      if (ytPlayer && typeof ytPlayer.destroy === 'function') {
        ytPlayer.destroy();
        ytPlayer = null;
      }

      if (document.fullscreenElement || document.webkitFullscreenElement) {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
      }
    }

    // Pendeteksi sentuhan ganda & tunggal pada layar video
    let clickTimer = null;
    touchLayer.addEventListener('click', () => {
      if (clickTimer) {
        // DOUBLE TAP - Keluar
        clearTimeout(clickTimer);
        clickTimer = null;
        closeOverlay();
      } else {
        // SINGLE TAP - Play/Pause
        clickTimer = setTimeout(() => {
          clickTimer = null;
          if (ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
            const state = ytPlayer.getPlayerState();
            if (state === 1) ytPlayer.pauseVideo(); // Jika Play, maka Pause
            else if (state === 2 || state === -1) ytPlayer.playVideo(); // Jika Pause, maka Play
          }
        }, 300);
      }
    });

    // Menutup overlay apabila user keluar dari fullscreen bawaan perangkat (misal swipe back)
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) closeOverlay();
    });
    document.addEventListener('webkitfullscreenchange', () => {
      if (!document.webkitFullscreenElement) closeOverlay();
    });

    async function loadRealVideos() {
      try {
        const q = await db.collection('videos')
          .orderBy('createdAt', 'desc')
          .limit(50)
          .get();

        if (q.empty) {
          videoGrid.innerHTML = '<div class="loading">Belum ada video. Upload dulu!</div>';
          return;
        }

        const videoHTML = [];

        for (const doc of q.docs) {
          const v = doc.data();
          let channelPhoto = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(v.namaAkun || 'User') + '&background=333&color=fff';
          
          try {
            const userDoc = await db.collection('users').doc(v.userId).get();
            if (userDoc.exists && userDoc.data().photoURL) {
              channelPhoto = userDoc.data().photoURL;
            }
          } catch(e) {}

          videoHTML.push(`
            <div class="video-card" onclick="playFullscreen('${doc.id}', '${v.link}')">
              <img src="${v.thumbnail}" class="video-thumb" alt="${v.judul}" loading="lazy">
              <div class="video-info">
                <img src="${channelPhoto}" class="channel-pic" alt="">
                <div class="video-details">
                  <div class="video-title">${v.judul}</div>
                  <div class="video-meta">${v.namaAkun} • ${formatAngka(v.views || 0)} x ditonton • ${waktuLalu(v.createdAt)}</div>
                </div>
              </div>
            </div>
          `);
        }

        videoGrid.innerHTML = videoHTML.join('');
      } catch (err) {
        videoGrid.innerHTML = '<div class="loading">Gagal load video: ' + err.message + '</div>';
      }
    }

    loadRealVideos();
  </script>
</body>
</html>
