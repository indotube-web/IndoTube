<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INDOTUBE - Beranda</title>
  <style>
    :root {
      --merah: #FF0000;
      --kuning: #FFD700;
      --oranye: #FF6600;
      --hijau: #00C853;
      --biru: #2196F3;
      --hitam: #0F0F0F;
      --hitam-lembut: #1A1A1A;
      --putih: #FFFFFF;
      --abu: #AAAAAA;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: var(--hitam); color: var(--putih); }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 56px;
      background: var(--hitam);
      border-bottom: 1px solid #272727;
      position: sticky;
      top: 0;
      z-index: 100;
      overflow: hidden;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
      flex: 1;
    }
    .logo-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(-90deg);
      flex-shrink: 0;
      z-index: 3;
      cursor: default; /* DEFAULT GA BISA KLIK */
    }
    .logo-icon.owner {
      cursor: pointer; /* KALO OWNER BARU BISA KLIK */
    }
    .logo-icon svg {
      width: 24px;
      height: 24px;
    }
    /* INDOTUBE SUPER PELAN */
    .logo-text {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -1px;
      position: absolute;
      left: 34px;
      animation: gantiWarna 15s infinite, jalanPelan 25s ease-in-out infinite;
      z-index: 1;
    }
    @keyframes gantiWarna {
      0%, 20% { color: var(--kuning); }
      20%, 40% { color: var(--merah); }
      40%, 60% { color: var(--biru); }
      60%, 80% { color: var(--hijau); }
      80%, 100% { color: var(--oranye); }
    }
    /* 25 DETIK - SUPER PELAN */
    @keyframes jalanPelan {
      0%, 8% { transform: translateX(0); }
      42%, 58% { transform: translateX(calc(100vw - 280px)); }
      92%, 100% { transform: translateX(0); }
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 2;
      background: var(--hitam);
      padding-left: 16px;
      position: relative;
    }
    .icon-search {
      width: 24px;
      height: 24px;
      fill: var(--putih);
      cursor: pointer;
    }
    .btn-upload {
      background: var(--merah);
      color: var(--putih);
      border: none;
      padding: 8px 16px;
      border-radius: 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-upload:hover { background: #cc0000; }
    .profile-pic {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #333;
      cursor: pointer;
      object-fit: cover;
    }

    .running-text {
      width: 100%;
      height: 40px;
      background: var(--hitam-lembut);
      border-bottom: 1px solid #272727;
      display: flex;
      align-items: center;
      padding: 0 16px;
      color: var(--abu);
      font-size: 14px;
      overflow: hidden;
    }
    .running-text span {
      white-space: nowrap;
      animation: marquee 20s linear infinite;
    }
    @keyframes marquee {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .video-card {
      cursor: pointer;
    }
    .video-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background: #272727;
      border-radius: 12px;
      object-fit: cover;
      margin-bottom: 12px;
    }
    .video-info {
      display: flex;
      gap: 12px;
    }
    .channel-pic {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }
    .video-details {
      flex: 1;
    }
    .video-title {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .video-meta {
      font-size: 13px;
      color: var(--abu);
    }

    @media (max-width: 768px) {
      .video-grid { grid-template-columns: 1fr; }
      .header-right { gap: 12px; }
      .btn-upload { padding: 6px 12px; font-size: 13px; }
      @keyframes jalanPelan {
        0%, 8% { transform: translateX(0); }
        42%, 58% { transform: translateX(calc(100vw - 220px)); }
        92%, 100% { transform: translateX(0); }
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <div class="logo-icon" id="logoIcon">
        <svg viewBox="0 0 32 32">
          <path d="M6 14 L12 20 L26 8" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <span class="logo-text">INDOTUBE</span>
    </div>

    <div class="header-right">
      <svg class="icon-search" viewBox="0 0 24 24">
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <button class="btn-upload" id="btnUpload">Upload</button>
      <img src="https://picsum.photos/seed/user/100/100" alt="Profile" class="profile-pic" id="profileBtn">
    </div>
  </header>

  <div class="running-text">
    <span id="runningTextContent">Selamat datang di INDOTUBE • Platform video kreator Indonesia • Upload karya terbaikmu sekarang</span>
  </div>

  <main class="container">
    <div class="video-grid" id="videoGrid"></div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA-2eXiVvN43dmcNlMx9hQ4wOv8Kjdjfw8",
      authDomain: "indotube-c7eb4.firebaseapp.com",
      projectId: "indotube-c7eb4",
      storageBucket: "indotube-c7eb4.firebasestorage.app",
      messagingSenderId: "568433040739",
      appId: "1:568433040739:web:c9b32f3d807b07fa5f4756"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const logoIcon = document.getElementById('logoIcon');
    const profileBtn = document.getElementById('profileBtn');
    
    // GANTI UID INI DENGAN UID GOOGLE KAMU
    const ownerUID = 'ISI_UID_GOOGLE_KAMU_DISINI';

    auth.onAuthStateChanged(user => {
      if (user) {
        profileBtn.src = user.photoURL || 'https://picsum.photos/seed/user/100/100';
        
        // CEK APAKAH OWNER
        if (user.uid === ownerUID) {
          logoIcon.classList.add('owner'); // KASIH CURSOR POINTER
          logoIcon.onclick = () => {
            location.href = 'admin.html';
          };
        }
      } else {
        // KALO BELUM LOGIN BALIK KE INDEX
        location.href = 'index.html';
      }
    });

    // KLIK PROFIL → PROFIL.HTML
    profileBtn.onclick = () => {
      location.href = 'profil.html';
    };

    document.getElementById('btnUpload').onclick = () => {
      alert('Fitur upload coming soon');
    };

    const dummyVideos = [
      { thumb: 'https://picsum.photos/seed/v1/640/360', title: 'Tutorial Masak Rendang 24 Jam', channel: 'Chef Indo', views: '120rb', time: '2 hari lalu' },
      { thumb: 'https://picsum.photos/seed/v2/640/360', title: 'Review HP Gaming 2 Jutaan', channel: 'GadgetIn', views: '89rb', time: '1 minggu lalu' },
      { thumb: 'https://picsum.photos/seed/v3/640/360', title: 'Vlog Jakarta Macet Parah', channel: 'JalanJalan', views: '45rb', time: '3 hari lalu' },
      { thumb: 'https://picsum.photos/seed/v4/640/360', title: 'Cover Lagu Viral TikTok', channel: 'MusicID', views: '200rb', time: '5 hari lalu' },
      { thumb: 'https://picsum.photos/seed/v5/640/360', title: 'Main Game Horror Tengah Malam', channel: 'GamerIndo', views: '67rb', time: '1 hari lalu' },
      { thumb: 'https://picsum.photos/seed/v6/640/360', title: 'Tutorial Hijab Simple 1 Menit', channel: 'BeautyID', views: '340rb', time: '2 minggu lalu' }
    ];

    function renderVideos() {
      const grid = document.getElementById('videoGrid');
      grid.innerHTML = dummyVideos.map(v => `
        <div class="video-card">
          <img src="${v.thumb}" class="video-thumb" alt="${v.title}">
          <div class="video-info">
            <img src="https://picsum.photos/seed/${v.channel}/100/100" class="channel-pic" alt="">
            <div class="video-details">
              <div class="video-title">${v.title}</div>
              <div class="video-meta">${v.channel} • ${v.views} x ditonton • ${v.time}</div>
            </div>
          </div>
        </div>
      `).join('');
    }

    renderVideos();
  </script>
</body>
  </html>
