<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INDOTUBE</title>
  <style>
    :root {
      --red: #FF0000;
      --yellow: #FFD700;
      --orange: #FF6600;
      --black: #0F0F0F;
      --black-soft: #1A1A1A;
      --black-light: #272727;
      --white: #FFFFFF;
      --white-soft: #E0E0E0;
      --white-dim: #AAAAAA;
      --text: #F1F1F1;
      --gray: #AAAAAA;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: var(--black); color: var(--text); }
    
    /* NAVIGASI ATAS */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 56px; background: var(--black);
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .logo-icon {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 28px; height: 28px; }
    .logo-text {
      font-size: 22px; font-weight: 700; letter-spacing: -1px;
      color: var(--yellow);
    }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .icon-btn {
      background: none; border: none; cursor: pointer; color: var(--text);
      display: flex; align-items: center; justify-content: center; width: 40px; height: 40px;
    }
    .icon-btn svg { width: 24px; height: 24px; fill: currentColor; }
    .profile-pic {
      width: 32px; height: 32px; border-radius: 50%; background: var(--black-light);
      cursor: pointer; object-fit: cover;
    }
    
    /* GRID VIDEO */
    .content { padding: 16px; }
    .video-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px; row-gap: 28px;
    }
    .video-card { cursor: pointer; }
    .thumbnail-box {
      position: relative; width: 100%; aspect-ratio: 16/9;
      background: var(--black-soft); border-radius: 12px; overflow: hidden;
      border: 1px solid var(--black-light);
    }
    .thumbnail-img { width: 100%; height: 100%; object-fit: cover; }
    
    .video-details { display: flex; gap: 12px; margin-top: 12px; padding: 0 4px; }
    .author-pic {
      width: 36px; height: 36px; border-radius: 50%; background: var(--black-light);
      flex-shrink: 0; object-fit: cover;
    }
    .meta-data { flex: 1; }
    .video-title {
      font-size: 14px; font-weight: 700; line-height: 1.4; color: var(--white);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; margin-bottom: 6px;
    }
    .video-author, .video-stats { font-size: 12px; color: var(--gray); line-height: 1.3; }
    .video-author { margin-bottom: 2px; font-weight: 500; }

    .empty-state {
      text-align: center; color: var(--gray); padding: 60px 0; font-size: 15px; grid-column: 1 / -1;
    }
    
    /* NAVIGASI BAWAH */
    .nav-bottom {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 48px;
      background: var(--black); border-top: 1px solid var(--black-light);
      display: flex; justify-content: space-around; align-items: center; z-index: 100;
    }
    .nav-item {
      background: none; border: none; color: var(--gray); cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .nav-item-active { color: var(--white); }
    .nav-item svg { width: 22px; height: 22px; fill: currentColor; }
    
    @media (max-width: 768px) {
      .video-grid { grid-template-columns: 1fr; gap: 24px; }
      .thumbnail-box { border-radius: 0; margin: 0 -16px; border-left: none; border-right: none; }
      .content { padding-bottom: 64px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left" id="logoHome">
      <div class="logo-icon">
        <svg viewBox="0 0 32 32">
          <path d="M6 14 L12 20 L26 8" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="rotate(-90 16 16)"/>
        </svg>
      </div>
      <span class="logo-text">INDOTUBE</span>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="btnCariAtas">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </button>
      <img src="" alt="Profil" class="profile-pic" id="profilePic">
    </div>
  </header>

  <main class="content">
    <div class="video-grid" id="videoGrid">
      <div class="empty-state">Memuat video terbaru...</div>
    </div>
  </main>

  <nav class="nav-bottom">
    <button class="nav-item nav-item-active">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </button>
    <button class="nav-item" id="navUpload">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </button>
  </nav>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // CONFIG ASLI MILIKMU
    const firebaseConfig = {
      apiKey: "AIzaSyA-2eXiVvN43dmcNlMx9hQ4wOv8Kjdjfw8",
      authDomain: "indotube-c7eb4.firebaseapp.com",
      projectId: "indotube-c7eb4",
      storageBucket: "indotube-c7eb4.firebasestorage.app",
      messagingSenderId: "568433040739",
      appId: "1:568433040739:web:c9b32f3d807b07fa5f4756"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const videoGrid = document.getElementById('videoGrid');
    const profilePic = document.getElementById('profilePic');

    // PROTEKSI LOGIN & ATUR FOTO PROFIL
    onAuthStateChanged(auth, (user) => {
      if (user) {
        profilePic.src = user.photoURL || "https://picsum.photos/seed/user/200/200";
      } else {
        location.href = 'index.html';
      }
    });

    // AMBIL DATA VIDEO DARI FIREBASE
    async function loadVideos() {
      try {
        const q = query(collection(db, "videos"), orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);
        
        if (querySnapshot.empty) {
          videoGrid.innerHTML = '<div class="empty-state">Belum ada video diupload. Jadi yang pertama!</div>';
          return;
        }

        let htmlContent = "";
        querySnapshot.forEach((doc) => {
          const video = doc.data();
          htmlContent += `
            <div class="video-card" onclick="window.location.href='${video.url}'">
              <div class="thumbnail-box">
                <img src="${video.thumb}" class="thumbnail-img" alt="${video.title}">
              </div>
              <div class="video-details">
                <img src="${video.authorPic || 'https://picsum.photos/seed/user/200/200'}" class="author-pic" alt="${video.authorName}">
                <div class="meta-data">
                  <div class="video-title">${video.title}</div>
                  <div class="video-author">${video.authorName}</div>
                  <div class="video-stats">${formatViews(video.views || 0)}</div>
                </div>
              </div>
            </div>
          `;
        });

        videoGrid.innerHTML = htmlContent;

      } catch (error) {
        console.error("Gagal memuat video:", error);
        videoGrid.innerHTML = '<div class="empty-state" style="color:red;">Gagal memuat data dari server</div>';
      }
    }

    function formatViews(num) {
      if (num >= 1000000) return (num / 1000000).toFixed(1) + " jt tayangan";
      if (num >= 1000) return (num / 1000).toFixed(0) + " rb tayangan";
      return num + " tayangan";
    }

    // NAVIGASI LINK
    document.getElementById('logoHome').addEventListener('click', () => location.reload());
    document.getElementById('btnCariAtas').addEventListener('click', () => location.href = 'cari.html');
    document.getElementById('navUpload').addEventListener('click', () => location.href = 'upload.html');
    profilePic.addEventListener('click', () => location.href = 'profil.html');

    // JALANKAN FUNGSI
    loadVideos();
  </script>
</body>
</html>
