<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INDOTUBE</title>
  <style>
    :root {
      --red: #FF0000;
      --yellow: #FFD700;
      --green: #00C853;
      --blue: #2196F3;
      --black: #0F0F0F;
      --black-soft: #1A1A1A;
      --black-light: #272727;
      --white: #FFFFFF;
      --text: #F1F1F1;
      --gray: #AAAAAA;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: var(--black); color: var(--text); }
    
   .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 56px; background: var(--black);
      position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--black-light);
    }
   .header-left { display: flex; align-items: center; gap: 6px; }
   .logo-icon {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    }
   .logo-icon svg { width: 28px; height: 28px; }
   .logo-text {
      font-size: 22px; font-weight: 700; letter-spacing: -1.5px;
      background: linear-gradient(135deg, var(--red) 0%, var(--yellow) 30%, var(--green) 60%, var(--blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
   .header-right { display: flex; align-items: center; gap: 16px; }
   .btn-search {
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 8px; border-radius: 50%;
    }
   .btn-search:hover { background: var(--black-light); }
   .btn-search svg { width: 24px; height: 24px; fill: var(--text); }
   .btn-upload {
      background: var(--red); border: none; color: var(--white);
      padding: 8px 16px; border-radius: 18px; cursor: pointer; 
      font-size: 14px; font-weight: 500;
    }
   .btn-upload:hover { background: #CC0000; }
   .profile {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--black-light); cursor: pointer;
      border: 1px solid var(--black-light);
      background-size: cover; background-position: center;
    }
    
   .content { padding: 24px; }
   .video-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px 16px;
    }
   .video-card { cursor: pointer; }
   .thumbnail {
      position: relative; width: 100%; aspect-ratio: 16/9; background: var(--black-light);
      border-radius: 12px; overflow: hidden; margin-bottom: 12px;
    }
   .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
   .video-info { display: flex; gap: 12px; }
   .channel-avatar {
      width: 36px; height: 36px; border-radius: 50%; background: var(--black-light); flex-shrink: 0;
      object-fit: cover;
    }
   .video-details { flex: 1; }
   .video-title {
      font-size: 16px; font-weight: 500; line-height: 1.4; margin-bottom: 6px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
   .video-meta { font-size: 14px; color: var(--gray); line-height: 1.4; }
   .views::after { content: " • "; }

    /* PLAYER MODAL EMBED */
   .player-modal {
      position: fixed; inset: 0; background: #000; z-index: 2000;
      display: flex; align-items: center; justify-content: center;
    }
   .player-modal iframe {
      width: 100%; height: 100%; border: 0;
    }
   .player-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--red); color: var(--white); border: 0;
      width: 40px; height: 40px; border-radius: 50%;
      font-size: 24px; cursor: pointer; z-index: 1;
    }

    @media (max-width: 1024px) {
     .video-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    }
    @media (max-width: 768px) {
     .content { padding: 16px; }
     .video-grid { grid-template-columns: 1fr; }
     .video-card { display: flex; gap: 12px; }
     .thumbnail { width: 160px; flex-shrink: 0; margin-bottom: 0; }
     .video-info { flex: 1; }
     .channel-avatar { display: none; }
     .header-right { gap: 12px; }
    }
    @media (max-width: 480px) {
     .video-card { flex-direction: column; }
     .thumbnail { width: 100%; }
     .btn-upload { padding: 8px 12px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <div class="logo-icon">
        <svg viewBox="0 0 32 32">
          <path d="M6 14 L12 20 L26 8" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="rotate(-90 16 16)"/>
        </svg>
      </div>
      <span class="logo-text">INDOTUBE</span>
    </div>
    <div class="header-right">
      <button class="btn-search" id="searchBtn" title="Telusuri">
        <svg viewBox="0 0 24 24">
          <path d="M16.32 14.9l5.39 5.38a1 1 0 0 1-1.42 1.42l-5.38-5.39a8 8 0 1 1 1.41-1.41zM10 16a6 6 0 1 0 0-12 6 6 0 0 0 0 12z"></path>
        </svg>
      </button>
      <button class="btn-upload" id="uploadBtn">Upload</button>
      <div class="profile" id="profileBtn"></div>
    </div>
  </header>

  <main class="content">
    <div class="video-grid" id="videoGrid">
      <div style="grid-column: 1/-1; text-align: center; color: var(--gray); padding: 40px 0;">Memuat video terbaru...</div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA-2eXiVvN43dmcNlMx9hQ4wOv8Kjdjfw8",
      authDomain: "indotube-c7eb4.firebaseapp.com",
      projectId: "indotube-c7eb4",
      storageBucket: "indotube-c7eb4.firebasestorage.app",
      messagingSenderId: "568433040739",
      appId: "1:568433040739:web:c9b32f3d807b07fa5f4756"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const videoGrid = document.getElementById('videoGrid');
    const profileBtn = document.getElementById('profileBtn');

    // KONVERSI URL YOUTUBE KE /embed/
    function toEmbedUrl(url) {
      if (!url) return '';
      let id = '';
      if (url.includes('youtu.be/')) {
        id = url.split('youtu.be/')[1].split('?')[0].split('&')[0];
      } else if (url.includes('watch?v=')) {
        id = url.split('watch?v=')[1].split('&')[0];
      } else if (url.includes('/embed/')) {
        return url;
      }
      return id? `https://www.youtube.com/embed/${id}?autoplay=1` : '';
    }

    // BUKA PLAYER MODAL
    window.openVideo = (url) => {
      const embed = toEmbedUrl(url);
      if (!embed) return;
      document.body.insertAdjacentHTML('beforeend', `
        <div class="player-modal" id="playerModal">
          <button class="player-close" onclick="playerModal.remove()">×</button>
          <iframe src="${embed}" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
      `);
    }

    // CEK LOGIN DAN PASANG FOTO PROFIL
    onAuthStateChanged(auth, (user) => {
      if (user) {
        profileBtn.style.backgroundImage = `url('${user.photoURL || "https://picsum.photos/seed/user/100/100"}')`;
        loadVideos();
      } else {
        location.href = 'index.html';
      }
    });

    // AMBIL DATA REAL DARI FIRESTORE
    async function loadVideos() {
      try {
        const q = query(collection(db, "videos"), orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          videoGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--gray); padding: 40px 0;">Belum ada video yang diupload.</div>';
          return;
        }

        let html = "";
        querySnapshot.forEach((doc) => {
          const v = doc.data();
          html += `
            <div class="video-card" onclick="openVideo('${v.url}')">
              <div class="thumbnail">
                <img src="${v.thumb}" alt="${v.title}">
              </div>
              <div class="video-info">
                <img class="channel-avatar" src="${v.authorPic || 'https://picsum.photos/seed/user/100/100'}" alt="${v.authorName}">
                <div class="video-details">
                  <h3 class="video-title">${v.title}</h3>
                  <div class="video-meta">
                    <div>${v.authorName}</div>
                    <div><span class="views">${formatViews(v.views || 0)}</span><span>Baru saja</span></div>
                  </div>
                </div>
              </div>
            </div>
          `;
        });

        videoGrid.innerHTML = html;

      } catch (error) {
        console.error("Gagal memuat video:", error);
        videoGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: red; padding: 40px 0;">Gagal memuat video dari database.</div>';
      }
    }

    function formatViews(num) {
      if (num >= 1000000) return (num / 1000000).toFixed(1) + " jt";
      if (num >= 1000) return (num / 1000).toFixed(0) + " rb";
      return num;
    }

    document.getElementById('searchBtn').addEventListener('click', () => {
      location.href = 'cari.html';
    });

    document.getElementById('uploadBtn').addEventListener('click', () => {
      location.href = 'upload.html';
    });

    profileBtn.addEventListener('click', () => {
      location.href = 'profil.html';
    });
  </script>
</body>
</html>
