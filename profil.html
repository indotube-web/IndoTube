<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil - INDOTUBE</title>
  <style>
    :root {
      --merah: #FF0000;
      --kuning: #FFD700;
      --biru-link: #3EA6FF;
      --hitam: #0F0F0F;
      --hitam-lembut: #1A1A1A;
      --abu-kotak: #272727;
      --putih: #FFFFFF;
      --abu: #AAAAAA;
      --abu-tombol: #333333;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: var(--hitam); color: var(--putih); }

 .header-back {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      padding: 0 16px;
      border-bottom: 1px solid #272727;
      position: sticky;
      top: 0;
      background: var(--hitam);
      z-index: 10;
    }
 .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
 .btn-back {
      background: none;
      border: none;
      cursor: pointer;
    }
 .btn-back svg {
      width: 24px;
      height: 24px;
      fill: var(--putih);
    }
 .logo-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(-90deg);
      cursor: pointer;
    }
 .logo-icon svg {
      width: 24px;
      height: 24px;
    }
 .btn-edit {
      background: var(--abu-tombol);
      color: var(--putih);
      border: none;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 18px;
      cursor: pointer;
      display: none;
    }
 .btn-edit.show {
      display: block;
    }

 .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 24px 16px;
      text-align: center;
    }

 .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 12px;
      display: block;
      background: var(--hitam);
      border: 1px solid #272727;
    }

 .profile-handle {
      color: var(--abu);
      font-size: 15px;
      margin-bottom: 8px;
    }

 .admin-gelar {
      min-height: 48px;
      margin-bottom: 16px;
      color: var(--abu);
      font-size: 14px;
    }

 .stats-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
 .stat-item {
      background: var(--abu-kotak);
      padding: 16px;
      border-radius: 12px;
    }
 .stat-angka {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
 .stat-label {
      font-size: 13px;
      color: var(--abu);
    }

 .profile-name {
      text-align: left;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      min-height: 22px;
    }

 .profile-bio {
      text-align: left;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 12px;
      white-space: pre-wrap;
      min-height: 20px;
    }

 .profile-link {
      display: block;
      text-align: left;
      color: var(--biru-link);
      font-size: 14px;
      text-decoration: none;
      margin-bottom: 12px;
      word-break: break-all;
      min-height: 20px;
    }
 .profile-link:hover {
      text-decoration: underline;
    }

 .admin-note {
      text-align: left;
      min-height: 20px;
      margin-bottom: 24px;
      color: var(--abu);
      font-size: 14px;
      border-bottom: 1px solid #272727;
      padding-bottom: 24px;
    }

 .video-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
 .video-item {
      display: flex;
      gap: 12px;
      text-align: left;
      cursor: pointer;
    }
 .video-thumb {
      width: 160px;
      aspect-ratio: 16/9;
      border-radius: 8px;
      object-fit: cover;
      background: #272727;
      flex-shrink: 0;
    }
 .video-info {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
 .video-title {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
 .video-views {
      font-size: 13px;
      color: var(--abu);
      margin-bottom: 8px;
    }
 .video-owner {
      font-size: 13px;
      color: var(--abu);
      margin-top: auto;
    }

    @media (max-width: 480px) {
  .video-thumb { width: 120px; }
  .video-title { font-size: 14px; }
    }
  </style>
</head>
<body>
  <header class="header-back">
    <div class="header-left">
      <div class="logo-icon" id="logoHome">
        <svg viewBox="0 0 32 32">
          <path d="M6 14 L12 20 L26 8" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
    </div>
    <button class="btn-edit" id="btnEdit">Edit</button>
  </header>

  <main class="container">
    <img alt="Profile" class="profile-avatar" id="avatar">
    <div class="profile-handle" id="handle">@username</div>
    <div class="admin-gelar" id="gelarAdmin"></div>
    <div class="stats-box">
      <div class="stat-item">
        <div class="stat-angka" id="totalPost">0</div>
        <div class="stat-label">Postingan</div>
      </div>
      <div class="stat-item">
        <div class="stat-angka" id="totalViews">0</div>
        <div class="stat-label">Tayangan</div>
      </div>
    </div>
    <div class="profile-name" id="namaAkun"></div>
    <div class="profile-bio" id="bio"></div>
    <a href="#" class="profile-link" id="linkExt" target="_blank"></a>
    <div class="admin-note" id="noteAdmin"></div>
    <div class="video-list" id="videoList"></div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA-2eXiVvN43dmcNlMx9hQ4wOv8Kjdjfw8",
      authDomain: "indotube-c7eb4.firebaseapp.com",
      projectId: "indotube-c7eb4",
      storageBucket: "indotube-c7eb4.firebasestorage.app",
      messagingSenderId: "568433040739",
      appId: "1:568433040739:web:c9b32f3d807b07fa5f4756"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const logoHome = document.getElementById('logoHome');
    const btnEdit = document.getElementById('btnEdit');
    const avatar = document.getElementById('avatar');
    const handle = document.getElementById('handle');
    const gelarAdmin = document.getElementById('gelarAdmin');
    const namaAkun = document.getElementById('namaAkun');
    const bio = document.getElementById('bio');
    const linkExt = document.getElementById('linkExt');
    const noteAdmin = document.getElementById('noteAdmin');
    const totalPost = document.getElementById('totalPost');
    const totalViews = document.getElementById('totalViews');

    logoHome.onclick = () => location.href = 'beranda.html';

    const urlParams = new URLSearchParams(location.search);
    let profileUid = urlParams.get('uid');
    let currentUserUid = null;

    auth.onAuthStateChanged(async user => {
      if (user) currentUserUid = user.uid;
      if (!profileUid && user) profileUid = user.uid;
      if (!profileUid) {
        location.href = 'index.html';
        return;
      }

      if (currentUserUid === profileUid) {
        btnEdit.classList.add('show');
        btnEdit.onclick = () => location.href = 'edit-profil.html';
      }

      loadProfile(profileUid);
      loadUserVideos(profileUid);
    });

    async function loadProfile(uid) {
      const doc = await db.collection('users').doc(uid).get();
      const defaultAvatar = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';

      if (!doc.exists) {
        const user = auth.currentUser;
        if (user && user.uid === uid) {
          const emailHandle = user.email.split('@')[0];
          handle.textContent = '@' + emailHandle;
          avatar.src = user.photoURL || defaultAvatar;
        }
        return;
      }

      const data = doc.data();

      avatar.src = data.photoURL || defaultAvatar;

      const defaultHandle = data.email? data.email.split('@')[0] : 'username';
      handle.textContent = '@' + (data.handle || defaultHandle);
      gelarAdmin.textContent = data.gelarAdmin || '';
      namaAkun.textContent = data.namaAkun || '';
      bio.textContent = data.bio || '';

      if (data.linkExt) {
        linkExt.href = data.linkExt;
        linkExt.textContent = data.linkExt;
        linkExt.style.display = 'block';
      } else {
        linkExt.style.display = 'none';
      }

      noteAdmin.textContent = data.noteAdmin || '';
      totalPost.textContent = formatAngka(data.totalPostingan || 0);
      totalViews.textContent = formatAngka(data.totalTayangan || 0);
    }

    async function loadUserVideos(uid) {
      const q = await db.collection('videos')
  .where('ownerUid', '==', uid)
  .orderBy('createdAt', 'desc')
  .get();

      const list = document.getElementById('videoList');
      list.innerHTML = '';

      q.forEach(doc => {
        const v = doc.data();
        list.innerHTML += `
          <div class="video-item" onclick="location.href='tonton.html?id=${doc.id}'">
            <img src="${v.thumbnailUrl}" class="video-thumb" alt="${v.judul}">
            <div class="video-info">
              <div class="video-title">${v.judul}</div>
              <div class="video-views">${formatAngka(v.tayangan)} x ditonton</div>
              <div class="video-owner">${v.ownerNama}</div>
            </div>
          </div>
        `;
      });
    }

    function formatAngka(num) {
      if (num >= 1000000000) return (num/1000000000).toFixed(1).replace('.0','') + ' Milyar';
      if (num >= 1000000) return (num/1000000).toFixed(1).replace('.0','') + 'jt';
      if (num >= 10000) return (num/1000).toFixed(1).replace('.0','') + 'rb';
      return num.toString();
    }
  </script>
</body>
</html>
