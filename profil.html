<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil - INDOTUBE</title>
  <style>
    :root {
      --red: #FF0000; --yellow: #FFD700; --orange: #FF6600; --green: #00C853;
      --blue: #2196F3; --black: #0F0F0F; --black-soft: #1A1A1A;
      --black-light: #272727; --white: #FFFFFF; --white-soft: #E0E0E0;
      --white-dim: #AAAAAA; --text: #F1F1F1; --gray: #AAAAAA;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: var(--black); color: var(--text); }
    
    .header { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 56px; background: var(--black); border-bottom: 1px solid var(--black-light); position: sticky; top: 0; z-index: 100; }
    .header-left { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .logo-text { font-size: 22px; font-weight: 700; color: var(--yellow); }
    .btn-edit { background: var(--black-light); color: var(--text); border: none; padding: 8px 16px; border-radius: 18px; cursor: pointer; font-size: 14px; font-weight: 700; display: none; }
    
    .container { max-width: 900px; margin: 0 auto; padding: 32px 16px; }
    .profile-top { text-align: center; margin-bottom: 24px; }
    .profile-pic { width: 80px; height: 80px; border-radius: 50%; background: var(--black-light); margin: 0 auto 12px; object-fit: cover; }
    .handle { font-size: 16px; color: var(--white-dim); }
    
    .video-list { margin-top: 24px; }
    .video-item { display: flex; gap: 12px; margin-bottom: 16px; cursor: pointer; align-items: center; }
    .video-thumb { width: 160px; aspect-ratio: 16/9; background: var(--black-light); border-radius: 8px; object-fit: cover; }
    .video-title { font-size: 15px; font-weight: 500; }
    
    /* Pop-up Player */
    .player-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 16px; }
    .player-container { width: 100%; max-width: 800px; position: relative; }
    .video-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
    .video-wrapper iframe { width: 100%; height: 100%; border: none; }
    .close-player { position: absolute; top: -40px; right: 0; color: white; font-size: 30px; cursor: pointer; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left" id="backHome"><span class="logo-text">PROFIL</span></div>
    <button class="btn-edit" id="btnEdit" onclick="location.href='edit-profil.html'">Edit</button>
  </header>

  <main class="container">
    <div class="profile-top">
      <img src="" class="profile-pic" id="profilePic">
      <div class="handle" id="handleDisplay">@...</div>
    </div>
    <div class="video-list" id="videoList"></div>
  </main>

  <div class="player-overlay" id="videoPlayerModal">
    <div class="player-container">
      <div class="close-player" id="closePlayerModal">&times;</div>
      <div class="video-wrapper">
        <iframe id="mainPlayer" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyA-2eXiVvN43dmcNlMx9hQ4wOv8Kjdjfw8", authDomain: "indotube-c7eb4.firebaseapp.com", projectId: "indotube-c7eb4", storageBucket: "indotube-c7eb4.firebasestorage.app", messagingSenderId: "568433040739", appId: "1:568433040739:web:c9b32f3d807b07fa5f4756" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        const handle = userDoc.exists() ? (userDoc.data().handle || user.email.split('@')[0]) : user.email.split('@')[0];
        document.getElementById('profilePic').src = (userDoc.exists() ? userDoc.data().pic : user.photoURL) || "https://picsum.photos/200";
        document.getElementById('handleDisplay').textContent = `@${handle}`;
        document.getElementById('btnEdit').style.display = 'block';
        
        // Load Video
        const q = query(collection(db, "videos"), where("authorId", "==", user.uid));
        const snap = await getDocs(q);
        const list = document.getElementById('videoList');
        snap.forEach(d => {
          const v = d.data();
          const item = document.createElement('div');
          item.className = 'video-item';
          item.innerHTML = `<img src="${v.thumb}" class="video-thumb"><div class="video-title">${v.title}</div>`;
          item.onclick = () => bukaPlayer(v.url);
          list.appendChild(item);
        });
      } else { location.href = 'index.html'; }
    });

    // MESIN AUTO-EMBED
    window.bukaPlayer = (url) => {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      const ytId = (match && match[2].length === 11) ? match[2] : null;
      document.getElementById('mainPlayer').src = ytId ? `https://www.youtube.com/embed/${ytId}?autoplay=1` : url;
      document.getElementById('videoPlayerModal').style.display = 'flex';
    };

    document.getElementById('closePlayerModal').onclick = () => {
      document.getElementById('videoPlayerModal').style.display = 'none';
      document.getElementById('mainPlayer').src = "";
    };
    document.getElementById('backHome').onclick = () => location.href = 'beranda.html';
  </script>
</body>
</html>
