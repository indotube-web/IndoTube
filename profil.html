<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil - INDOTUBE</title>
  <style>
    :root {
      --merah: #FF0000;
      --kuning: #FFD700;
      --biru-link: #3EA6FF;
      --hitam: #0F0F0F;
      --hitam-lembut: #1A1A1A;
      --abu-kotak: #272727;
      --putih: #FFFFFF;
      --abu: #AAAAAA;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: var(--hitam); color: var(--putih); }

    /* HEADER BACK */
    .header-back {
      display: flex;
      align-items: center;
      height: 56px;
      padding: 0 16px;
      border-bottom: 1px solid #272727;
      position: sticky;
      top: 0;
      background: var(--hitam);
      z-index: 10;
    }
    .btn-back {
      background: none;
      border: none;
      cursor: pointer;
    }
    .btn-back svg {
      width: 24px;
      height: 24px;
      fill: var(--putih);
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 24px 16px;
      text-align: center;
    }

    /* 1. FOTO PROFIL LINGKARAN TENGAH */
    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 12px;
      display: block;
    }

    /* 2. HANDLE @TANPA_SPASI ABU-ABU */
    .profile-handle {
      color: var(--abu);
      font-size: 15px;
      margin-bottom: 24px;
    }

    /* 3. KOSONGKAN 2 BARIS UNTUK GELAR */
    .profile-gelar {
      height: 48px;
      margin-bottom: 24px;
    }

    /* 4. 2 KOTAK ABU-ABU POSTINGAN + TAYANGAN */
    .stats-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-item {
      background: var(--abu-kotak);
      padding: 16px;
      border-radius: 12px;
    }
    .stat-angka {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .stat-label {
      font-size: 13px;
      color: var(--abu);
    }

    /* 5. NAMA AKUN - PUTIH TEBAL KIRI */
    .profile-name {
      text-align: left;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    /* 6. BIO - PUTIH BIASA KIRI */
    .profile-bio {
      text-align: left;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 12px;
      white-space: pre-wrap;
    }

    /* 7. LINK EXTERNAL - BIRU KIRI */
    .profile-link {
      display: block;
      text-align: left;
      color: var(--biru-link);
      font-size: 14px;
      text-decoration: none;
      margin-bottom: 24px;
      word-break: break-all;
    }
    .profile-link:hover {
      text-decoration: underline;
    }

    /* 8. DAFTAR VIDEO POSTINGAN PEMILIK */
    .section-title {
      text-align: left;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      border-top: 1px solid #272727;
      padding-top: 24px;
    }
    .video-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .video-item {
      display: flex;
      gap: 12px;
      text-align: left;
      cursor: pointer;
    }
    .video-thumb {
      width: 160px;
      aspect-ratio: 16/9;
      border-radius: 8px;
      object-fit: cover;
      background: #272727;
      flex-shrink: 0;
    }
    .video-info {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .video-title {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.3;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .video-views {
      font-size: 13px;
      color: var(--abu);
      margin-bottom: 8px;
    }
    .video-owner {
      font-size: 13px;
      color: var(--abu);
      margin-top: auto;
    }

    @media (max-width: 480px) {
      .video-thumb { width: 120px; }
      .video-title { font-size: 14px; }
    }
  </style>
</head>
<body>
  <!-- HEADER BACK -->
  <header class="header-back">
    <button class="btn-back" onclick="history.back()">
      <svg viewBox="0 0 24 24">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </svg>
    </button>
  </header>

  <main class="container">
    <!-- 1. FOTO PROFIL LINGKARAN -->
    <img src="https://picsum.photos/seed/user/300/300" alt="Profile" class="profile-avatar" id="avatar">

    <!-- 2. HANDLE @ ABU-ABU -->
    <div class="profile-handle" id="handle">@username</div>

    <!-- 3. KOSONG 2 BARIS UNTUK GELAR -->
    <div class="profile-gelar" id="gelar"></div>

    <!-- 4. 2 KOTAK ABU-ABU -->
    <div class="stats-box">
      <div class="stat-item">
        <div class="stat-angka" id="totalPost">0</div>
        <div class="stat-label">Postingan</div>
      </div>
      <div class="stat-item">
        <div class="stat-angka" id="totalViews">0</div>
        <div class="stat-label">Tayangan</div>
      </div>
    </div>

    <!-- 5. NAMA AKUN TEBAL KIRI -->
    <div class="profile-name" id="namaAkun">Nama Akun</div>

    <!-- 6. BIO PUTIH BIASA KIRI -->
    <div class="profile-bio" id="bio">Ini bio user. Bisa panjang beberapa baris.</div>

    <!-- 7. LINK EXTERNAL BIRU KIRI -->
    <a href="#" class="profile-link" id="linkExt" target="_blank">https://linktr.ee/username</a>

    <!-- 8. VIDEO POSTINGAN PEMILIK -->
    <div class="section-title">Video</div>
    <div class="video-list" id="videoList"></div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA-2eXiVvN43dmcNlMx9hQ4wOv8Kjdjfw8",
      authDomain: "indotube-c7eb4.firebaseapp.com",
      projectId: "indotube-c7eb4",
      storageBucket: "indotube-c7eb4.firebasestorage.app",
      messagingSenderId: "568433040739",
      appId: "1:568433040739:web:c9b32f3d807b07fa5f4756"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // AMBIL UID DARI URL ?uid=xxx ATAU USER LOGIN
    const urlParams = new URLSearchParams(location.search);
    let profileUid = urlParams.get('uid');

    auth.onAuthStateChanged(async user => {
      if (!profileUid && user) profileUid = user.uid;
      if (!profileUid) {
        location.href = 'index.html';
        return;
      }
      loadProfile(profileUid);
      loadUserVideos(profileUid);
    });

    async function loadProfile(uid) {
      const doc = await db.collection('users').doc(uid).get();
      if (!doc.exists) return;
      
      const data = doc.data();
      document.getElementById('avatar').src = data.photoURL || 'https://picsum.photos/seed/user/300/300';
      document.getElementById('handle').textContent = '@' + (data.handle || 'username');
      document.getElementById('gelar').textContent = data.gelar || '';
      document.getElementById('namaAkun').textContent = data.namaAkun || data.handle || 'Nama Akun';
      document.getElementById('bio').textContent = data.bio || '';
      
      if (data.linkExt) {
        const link = document.getElementById('linkExt');
        link.href = data.linkExt;
        link.textContent = data.linkExt;
      } else {
        document.getElementById('linkExt').style.display = 'none';
      }
      
      document.getElementById('totalPost').textContent = data.totalPostingan || 0;
      document.getElementById('totalViews').textContent = formatAngka(data.totalTayangan || 0);
    }

    async function loadUserVideos(uid) {
      const q = await db.collection('videos')
        .where('ownerUid', '==', uid)
        .orderBy('createdAt', 'desc')
        .get();
      
      const list = document.getElementById('videoList');
      list.innerHTML = '';
      
      q.forEach(doc => {
        const v = doc.data();
        list.innerHTML += `
          <div class="video-item" onclick="location.href='tonton.html?id=${doc.id}'">
            <img src="${v.thumbnailUrl}" class="video-thumb" alt="${v.judul}">
            <div class="video-info">
              <div class="video-title">${v.judul}</div>
              <div class="video-views">${formatAngka(v.tayangan)} x ditonton</div>
              <div class="video-owner">${v.ownerNama}</div>
            </div>
          </div>
        `;
      });
    }

    function formatAngka(num) {
      if (num >= 1000000) return (num/1000000).toFixed(1) + 'jt';
      if (num >= 1000) return (num/1000).toFixed(1) + 'rb';
      return num.toString();
    }
  </script>
</body>
</html>
