    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    badan { latar belakang: var(--hitam); warna: var(--teks); }
    
    .header {

    }
    
    .spacer { tinggi: 24px; }

      padding: 16px; border-bottom: 1px solid var(--black-light);
      display: flex; justify-content: space-between; align-items: center;
    }
    .popup-title { ukuran font: 18px; berat font: 700; warna: var(--yellow); }
    .tutup-popup {
      latar belakang: tidak ada; batas: tidak ada; warna: var(--teks);

    .popup-body { padding: 20px; }
    
    .edit-group { margin-bottom: 20px; position: relative; }
    .edit-label { ukuran font: 13px; warna: var(--gray); margin bawah: 6px; tampilan: blok; berat font: 700; }
    .edit-input {
      lebar: 100%; latar belakang: var(--black-soft);
      batas: 1px solid var(--black-light); radius batas: 8px;
      padding: 10px 36px 10px 12px; color: var(--text); font-size: 14px; outline: none;
    }
    .edit-input:focus { border-color: var(--red); }
    .edit-textarea { resize: vertical; min-height: 80px; }
    .edit-icon {
      posisi: absolut; kanan: 10px; atas: 32px; lebar: 16px; tinggi: 16px;
      isi: var(--abu-abu); kejadian penunjuk: tidak ada;
    }
    .jumlah-karakter {
      Ukuran font: 12px; warna: var(--gray); perataan teks: kanan; margin atas: 4px;
    }
    
    .popup-footer {
      padding: 16px; border-top: 1px solid var(--black-light);
      display: flex; justify-content: space-between; align-items: center;
    }
    .tampilan email {
      Ukuran font: 13px; warna: var(--putih); ketebalan font: 700;
    }
    .aksi-footer {
      display: flex; gap: 16px; align-items: center;
    }
    .tombol teks {
      latar belakang: tidak ada; batas: tidak ada; kursor: penunjuk; ukuran font: 14px; ketebalan font: 700;
    }
    .text-logout { color: var(--orange); }
    .text-delete { color: var(--green); }
    .text-save { color: var(--blue); }
    
    .edit-video-list .video-item { position: relative; }
    .hapus-video {
      posisi: absolut; atas: 8px; kanan: 8px; latar belakang: var(--red);
      warna: var(--putih); batas: tidak ada; lebar: 24px; tinggi: 24px;
      radius-batas: 50%; kursor: penunjuk; ukuran-font: 16px; tinggi-baris: 1;
    }

    @media (max-width: 768px) {
      .video-thumb { width: 120px; }
      .statistik { gap: 8px; }
      .stat-box { padding: 12px; }
    }
  </style>
</head>
<body>

    const firebaseConfig = {
      apiKey: "AIzaSyA-2eXiVvN43dmcNlMx9hQ4wOv8Kjdjfw8",
      authDomain: "indotube-c7eb4.firebaseapp.com",
      ID proyek: "indotube-c7eb4",

    fungsi asinkron loadProfile() {
      mencoba {
        const userDoc = await getDoc(doc(db, "users", activeUser.uid));
        misalkan namaUser = activeUser.displayName || "Pengguna IndoTube";
        
        // LOGIKA PANCINGAN: Potong email (misal: kopipahit@gmail.com -> kopipahit)
        const emailGoogle = activeUser.email || "";
        const handleOtomatis = emailGoogle ? emailGoogle.split('@')[0].toLowerCase().replace(/[^a-z0-9]/g, "") : "user";

        jika (userDoc.exists()) {
          const data = userDoc.data();
          
          namaPengguna = data.nama || data.namatampilan || pengguna aktif.namatampilan || "Pengguna IndoTube";
          
          document.getElementById('profilePic').src = data.pic || data.photoURL || activeUser.photoURL || "https://picsum.photos/seed/user1/200/200";
          document.getElementById('handleDisplay').textContent = `@${data.handle || handleOtomatis}`;

          dokumen.getElementById('bioDisplay').textContent = data.bio || 'Belum ada bio.';
          
          const linkDisp = document.getElementById('linkDisplay');

          document.getElementById('handleDisplay').textContent = `@${handleOtomatis}`;
          document.getElementById('namaAkunDisplay').textContent = namaUser;
          document.getElementById('bioDisplay').textContent = 'Silakan klik Edit untuk melengkapi profil Anda.';
          document.getElementById('linkDisplay').style.display = 'none';

        // PENTING: Tombol edit ditaruh di luar blok agar selalu muncul dan tidak macet!
        document.getElementById('btnEdit').style.display = 'block';
        tunggu loadUserVideos(namaUser);
        
      } tangkap (kesalahan) {
        console.error("Gagal memuat profil:",err);
        document.getElementById('btnEdit').style.display = 'block';
      }
    }

    // MEMUAT VIDEO KHUSUS MILIK USER AKTIF
    fungsi asinkron loadUserVideos(authorName) {
      const videoList = document.getElementById('videoList');
      mencoba {
        const q = query(collection(db, "videos"), where("authorId", "==", activeUser.uid));
        const snap = await getDocs(q);
        
        Video lokal = [];
        misalkan totalViews = 0;
        
        jepret.forEach(doc => {
          localVideos.push({ id: doc.id, ...doc.data() });
          totalViews += (doc.data().views || 0);
        });

        document.getElementById('totalPosts').textContent = localVideos.length;
        document.getElementById('totalViews').textContent = formatViews(totalViews);

        jika (localVideos.length === 0) {
          videoList.innerHTML = '<div style="color:var(--gray); font-size:14px; text-align:center; padding: 20px 0;">Belum ada video yang diupload.</div>';

              <div class="video-title">${v.title}</div>
              <div class="video-meta">${formatViews(v.views || 0)} • ${authorName}</div>
            </div>
          </div>
        `).join('');
      } tangkap (kesalahan) {
        console.error("Gagal memuat video pengguna:",err);
      }
    }

    fungsi formatViews(num) {
      jika (num >= 1000000) kembalikan (num / 1000000).toFixed(1) + " jt";
      jika (num >= 1000) kembalikan (num / 1000).toFixed(0) + " rb";
      kembalikan num;
    }

    // KONTROL POPUP
    const popup = document.getElementById('popupEdit');
    
    document.getElementById('btnEdit').addEventListener('click', async () => {
      const userDoc = await getDoc(doc(db, "users", activeUser.uid));
      const emailGoogle = activeUser.email || "";
      const handleOtomatis = emailGoogle ? emailGoogle.split('@')[0].toLowerCase().replace(/[^a-z0-9]/g, "") : "user";
      
      jika (userDoc.exists()) {

        document.getElementById('editHandle').value = data.handle || handleOtomatis;

        document.getElementById('editLink').value = data.link || data.website || '';
        dokumen.getElementById('emailDisplay').textContent = data.email || pengguna aktif.email;
        document.getElementById('bioCount').textContent = `${(data.bio || '').length} / 200`;

        // Form default jika userDoc belum ada di database
        document.getElementById('editHandle').value = handleOtomatis;
        document.getElementById('editNama').value = activeUser.displayName || '';
        document.getElementById('editBio').value = '';
        document.getElementById('editLink').value = '';
        document.getElementById('emailDisplay').textContent = activeUser.email;
        document.getElementById('bioCount').textContent = "0/200";
      }
      
      renderEditVideoList();
      popup.style.display = 'block';
    });

    fungsi renderEditVideoList() {
      const editVideoList = document.getElementById('editVideoList');
      jika (localVideos.length === 0) {
        editVideoList.innerHTML = '';
        kembali;
      }
      editVideoList.innerHTML = localVideos.map(v => `
        <div class="video-item" style="cursor:default;">
          <img src="${v.thumb}" class="video-thumb" alt="">
          <div class="video-info">
            <div class="video-title">${v.title}</div>
          </div>
          <button class="delete-video" data-id="${v.id}">×</button>
        </div>
      `).join('');

      // PROSES HAPUS VIDEO DARI POPUP EDIT
      document.querySelectorAll('.delete-video').forEach(btn => {
        btn.addEventListener('klik', async (e) => {
          e.stopPropagation();
          const idVideo = btn.getAttribute('data-id');
          if (confirm('Hapus video ini secara permanen?')) {
            mencoba {
              await deleteDoc(doc(db, "videos", idVideo));
              alert('Video berhasil dihapus!');
              menunggu loadProfile(); // muat ulang data luar
              renderEditVideoList(); // muat ulang daftar popup
            } tangkap (kesalahan) {
              alert("Gagal menghapus video: " + err.message);
            }
          }
        });
      });
    }

    document.getElementById('closePopup').addEventListener('click', () => {
      popup.style.display = 'none';
    });

    document.getElementById('editBio').addEventListener('input', (e) => {
      document.getElementById('bioCount').textContent = `${e.target.value.length} / 200`;
    });

    // SIMPAN PERUBAHAN PROFILE KE DALAM DATABASE (MENGGUNAKAN SETDOC MERGE AGAR AMAN JIKA DOKUMEN BELUM ADA)
    document.getElementById('btnSave').addEventListener('click', async () => {
      const handleVal = document.getElementById('editHandle').value.trim().toLowerCase().replace(/[^a-z0-9]/g, "");
      const namaVal = document.getElementById('editNama').value.trim();
      const bioVal = document.getElementById('editBio').value;
      const linkVal = document.getElementById('editLink').value.trim();

      jika (!handleVal || !namaVal) {
        alert('Handle dan Nama tidak boleh kosong!');
        kembali;
      }

      mencoba {
        // Menggunakan setDoc + merge: true agar jika dokumen baru, dia membuat dokumen; jika sudah ada, dia mengupdate.
        await setDoc(doc(db, "users", activeUser.uid), {
          pegangan: handleVal,
          nama: namaVal,
          bio: bioVal,
          tautan: linkVal,
          email: activeUser.email,
          pic: activeUser.photoURL || "https://picsum.photos/seed/user1/200/200"
        }, { merge: true });
        
        alert('Profil berhasil diperbarui!');
        popup.style.display = 'none';
        tunggu loadProfile();
      } tangkap (kesalahan) {
        alert("Gagal memperbarui profil: " + err.message);
      }
    });

    // PROSES KELUAR
    document.getElementById('btnLogout').addEventListener('click', async () => {
      if (confirm('Apakah Anda ingin Logout?')) {
        tunggu signOut(auth);
        location.href = 'index.html';
      }
    });

    // PROSES HAPUS AKUN PERMANEN
    document.getElementById('btnDeleteAccount').addEventListener('click', async () => {
      if (confirm('YAKIN HAPUS AKUN PERMANEN? Semua data profil Anda akan dihapus!')) {
        mencoba {
          await deleteDoc(doc(db, "users", activeUser.uid));
          tunggu penghapusan pengguna aktif;
          alert('Akun berhasil dihapus.');
          location.href = 'index.html';
        } tangkap (kesalahan) {
          alert('Keamanan mendeteksi aksi sensitif. Silakan log out lalu log in kembali sebelum melakukan penghapusan akun.');
        }
      }
    });

    document.getElementById('backHome').addEventListener('click', () => {

    });

    document.getElementById('btnSave').addEventListener('click', async () => {
      const handleVal = document.getElementById('editHandle').value.trim().toLowerCase().replace(/[^a-z0-9]/g, "");
      const namaVal = document.getElementById('editNama').value.trim();
      const bioVal = document.getElementById('editBio').value;
      const linkVal = document.getElementById('editLink').value.trim();

      jika (!handleVal || !namaVal) {
        alert('Handle dan Nama tidak boleh kosong!');
