<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - INDOTUBE</title>
  <style>
    :root {
      --merah: #FF0000;
      --oranye: #FF6600;
      --abu-nonaktif: #555555;
      --hitam: #0F0F0F;
      --hitam-lembut: #1A1A1A;
      --abu-kotak: #272727;
      --putih: #FFFFFF;
      --abu: #AAAAAA;
      --kuning: #FFD700;
      --hijau: #00C853;
      --biru: #2196F3;
      --pink: #E91E63;
      --ungu: #9C27B0;
      --cyan: #00BCD4;
      --lime: #CDDC39;
      --amber: #FFC107;
      --deep-orange: #FF5722;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { 
      background: var(--hitam); 
      color: var(--putih);
      min-height: 100vh;
    }
    
    .admin-header {
      background: var(--hitam-lembut);
      border-bottom: 1px solid #333;
      padding: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    
    .admin-header h1 {
      font-size: 20px;
    }

    .btn-beranda {
      background: var(--oranye);
      color: var(--putih);
      border: none;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 18px;
      cursor: pointer;
      transition: .2s;
    }
    .btn-beranda:hover { opacity: .8; }
    
    .task-section {
      background: var(--abu-kotak);
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    
    .task-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--abu);
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    
    #btnLayarDepan, #btnRunningText {
      background: var(--merah);
      color: var(--putih);
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 18px;
      cursor: pointer;
      transition: .2s;
    }
    #btnLayarDepan:hover, #btnRunningText:hover { opacity: .8; }
    
    #btnLayarDepan.active, #btnRunningText.active {
      background: var(--abu-nonaktif);
    }
    
    .status {
      margin-top: 8px;
      color: var(--abu);
      font-size: 13px;
      word-break: break-all;
    }

    /* TOMBOL VERIFIKASI AKUN */
    .btn-verifikasi {
      background: var(--kuning);
      color: var(--hitam);
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 18px;
      cursor: pointer;
      transition: .2s;
      margin-top: 16px;
    }
    .btn-verifikasi:hover { opacity: .8; }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px 16px;
    }
    
    .placeholder {
      background: var(--abu-kotak);
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      color: var(--abu);
      border: 2px dashed #333;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .overlay.show { display: flex; }
    
    .popup {
      background: var(--hitam-lembut);
      padding: 24px;
      border-radius: 16px;
      border: 1px solid #333;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .popup h3 {
      margin-bottom: 16px;
      font-size: 18px;
    }
    .popup textarea {
      width: 100%;
      background: var(--hitam);
      border: 1px solid #333;
      padding: 12px;
      color: var(--putih);
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 700;
      resize: vertical;
      min-height: 80px;
      font-family: Arial, sans-serif;
    }
    .popup input {
      width: 100%;
      background: var(--hitam);
      border: 1px solid #333;
      padding: 12px;
      color: var(--putih);
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    
    .color-control {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .color-label {
      color: var(--putih);
      font-size: 14px;
    }
    .toggle-switch {
      position: relative;
      width: 50px;
      height: 26px;
      background: #333;
      border-radius: 18px;
      cursor: pointer;
      transition: .3s;
    }
    .toggle-switch.active {
      background: var(--merah);
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: var(--putih);
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: .3s;
    }
    .toggle-switch.active::after {
      left: 27px;
    }
    
    .color-palette {
      display: none;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .color-palette.show {
      display: grid;
    }
    .color-box {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: .2s;
    }
    .color-box:hover {
      transform: scale(1.1);
    }
    .color-box.selected {
      border-color: var(--putih);
      box-shadow: 0 0 0 2px var(--merah);
    }
    
    .popup-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .popup-actions button {
      padding: 10px 20px;
      border: none;
      border-radius: 18px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-kirim {
      background: var(--merah);
      color: var(--putih);
    }
    .btn-batal {
      background: #333;
      color: var(--putih);
    }
    .btn-cari {
      background: var(--oranye);
      color: var(--putih);
    }

    /* LIST HASIL SEARCH USER */
    .user-list {
      margin-top: 16px;
      max-height: 300px;
      overflow-y: auto;
    }
    .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--hitam);
      border: 1px solid #333;
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .user-item:hover {
      background: var(--abu-kotak);
    }
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--hitam);
    }
    .user-info {
      flex: 1;
    }
    .user-handle {
      font-size: 14px;
      font-weight: 700;
      color: var(--putih);
    }
    .user-name {
      font-size: 12px;
      color: var(--abu);
    }
  </style>
</head>
<body>
  <header class="admin-header">
    <div class="header-top">
      <h1>Panel Admin INDOTUBE</h1>
      <button class="btn-beranda" id="btnBeranda">Beranda</button>
    </div>
    
    <div class="task-section">
      <div class="task-title">Background Global</div>
      <button id="btnLayarDepan">Layar Depan</button>
      <div class="status" id="statusBg">Background kosong</div>
    </div>
    
    <div class="task-section">
      <div class="task-title">Running Text Beranda</div>
      <button id="btnRunningText">Running Text Beranda</button>
      <div class="status" id="statusText">Running text kosong</div>
    </div>

    <div class="task-section">
      <div class="task-title">Moderasi Akun</div>
      <button class="btn-verifikasi" id="btnVerifikasiAkun">Verifikasi Akun</button>
    </div>
    
  </header>

  <main class="container">
    <div class="placeholder">
      Area kerja admin.<br>
      Tambahin fitur lain disini nanti.
    </div>
  </main>

  <!-- POPUP LAYAR DEPAN -->
  <div class="overlay" id="overlayBg">
    <div class="popup">
      <h3>Set Background Index</h3>
      <input type="text" id="inputYoutube" placeholder="Paste link YouTube: https://youtu.be/...">
      <div class="popup-actions">
        <button class="btn-batal" id="btnBatalBg">Batal</button>
        <button class="btn-kirim" id="btnKirimBg">Kirim</button>
      </div>
    </div>
  </div>

  <!-- POPUP RUNNING TEXT -->
  <div class="overlay" id="overlayText">
    <div class="popup">
      <h3>Set Running Text Beranda</h3>
      <textarea id="inputRunningText" placeholder="Tulis teks maks 300 karakter..." maxlength="300"></textarea>
      
      <div class="color-control">
        <span class="color-label" id="colorLabel">Pilihan warna</span>
        <div class="toggle-switch" id="toggleWarna"></div>
      </div>
      
      <div class="color-palette" id="colorPalette">
        <div class="color-box" style="background: #FFFFFF" data-color="#FFFFFF"></div>
        <div class="color-box" style="background: #FF0000" data-color="#FF0000"></div>
        <div class="color-box" style="background: #FF6600" data-color="#FF6600"></div>
        <div class="color-box" style="background: #FFD700" data-color="#FFD700"></div>
        <div class="color-box" style="background: #00C853" data-color="#00C853"></div>
        <div class="color-box" style="background: #2196F3" data-color="#2196F3"></div>
        <div class="color-box" style="background: #9C27B0" data-color="#9C27B0"></div>
        <div class="color-box" style="background: #E91E63" data-color="#E91E63"></div>
        <div class="color-box" style="background: #00BCD4" data-color="#00BCD4"></div>
        <div class="color-box" style="background: #CDDC39" data-color="#CDDC39"></div>
        <div class="color-box" style="background: #FFC107" data-color="#FFC107"></div>
        <div class="color-box" style="background: #FF5722" data-color="#FF5722"></div>
      </div>
      
      <div class="popup-actions">
        <button class="btn-batal" id="btnBatalText">Batal</button>
        <button class="btn-kirim" id="btnKirimText">Kirim</button>
      </div>
    </div>
  </div>

  <!-- POPUP VERIFIKASI AKUN -->
  <div class="overlay" id="overlayVerifikasi">
    <div class="popup">
      <h3>Cari Akun Untuk Diverifikasi</h3>
      <input type="text" id="inputSearchUser" placeholder="Ketik handle atau nama...">
      <div class="popup-actions">
        <button class="btn-batal" id="btnBatalVerifikasi">Batal</button>
        <button class="btn-cari" id="btnCariUser">Cari</button>
      </div>
      <div class="user-list" id="userList"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA-2eXiVvN43dmcNlMx9hQ4wOv8Kjdjfw8",
      authDomain: "indotube-c7eb4.firebaseapp.com",
      projectId: "indotube-c7eb4",
      storageBucket: "indotube-c7eb4.firebasestorage.app",
      messagingSenderId: "568433040739",
      appId: "1:568433040739:web:c9b32f3d807b07fa5f4756"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const OWNER_UID = "OPcnqsU7hXQdfIKzijrXFpD1eom2";
    const defaultAvatar = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';

    // ELEMENTS
    const btnBeranda = document.getElementById('btnBeranda');
    const btnLayarDepan = document.getElementById('btnLayarDepan');
    const btnRunningText = document.getElementById('btnRunningText');
    const statusBg = document.getElementById('statusBg');
    const statusText = document.getElementById('statusText');
    
    const overlayBg = document.getElementById('overlayBg');
    const inputYoutube = document.getElementById('inputYoutube');
    const btnKirimBg = document.getElementById('btnKirimBg');
    const btnBatalBg = document.getElementById('btnBatalBg');
    
    const overlayText = document.getElementById('overlayText');
    const inputRunningText = document.getElementById('inputRunningText');
    const toggleWarna = document.getElementById('toggleWarna');
    const colorLabel = document.getElementById('colorLabel');
    const colorPalette = document.getElementById('colorPalette');
    const btnKirimText = document.getElementById('btnKirimText');
    const btnBatalText = document.getElementById('btnBatalText');

    const btnVerifikasiAkun = document.getElementById('btnVerifikasiAkun');
    const overlayVerifikasi = document.getElementById('overlayVerifikasi');
    const inputSearchUser = document.getElementById('inputSearchUser');
    const btnCariUser = document.getElementById('btnCariUser');
    const btnBatalVerifikasi = document.getElementById('btnBatalVerifikasi');
    const userList = document.getElementById('userList');

    let currentBg = null;
    let currentRunningText = null;
    let currentColor = '#FFFFFF';
    let selectedColor = '#FFFFFF';

    // CEK OWNER
    auth.onAuthStateChanged(user => {
      if (!user || user.uid !== OWNER_UID) {
        alert('Akses ditolak. Kamu bukan owner.');
        location.href = 'beranda.html';
      }
    });

    btnBeranda.onclick = () => location.href = 'beranda.html';

    // LISTEN FIRESTORE
    db.collection('config').doc('global').onSnapshot(doc => {
      const data = doc.data() || {};
      currentBg = data.backgroundUrl || null;
      currentRunningText = data.runningText || null;
      currentColor = data.textColor || '#FFFFFF';
      updateButtons();
    });

    function updateButtons() {
      if (currentBg) {
        btnLayarDepan.classList.add('active');
        btnLayarDepan.textContent = 'Hapus Background';
        statusBg.textContent = 'Aktif: ' + currentBg;
      } else {
        btnLayarDepan.classList.remove('active');
        btnLayarDepan.textContent = 'Layar Depan';
        statusBg.textContent = 'Background kosong';
      }
      
      if (currentRunningText) {
        btnRunningText.classList.add('active');
        btnRunningText.textContent = 'Hapus Running Text';
        statusText.textContent = 'Aktif: ' + currentRunningText.substring(0, 50) + '...';
      } else {
        btnRunningText.classList.remove('active');
        btnRunningText.textContent = 'Running Text Beranda';
        statusText.textContent = 'Running text kosong';
      }
    }

    // === LAYAR DEPAN ===
    btnLayarDepan.onclick = () => {
      if (currentBg) {
        if (confirm('Hapus background untuk semua user?')) {
          db.collection('config').doc('global').update({ 
            backgroundUrl: null,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        }
      } else {
        overlayBg.classList.add('show');
        inputYoutube.value = '';
        inputYoutube.focus();
      }
    };

    btnKirimBg.onclick = async () => {
      const url = inputYoutube.value.trim();
      if (!url) return alert('Isi link YouTube dulu');
      if (!url.includes('youtube') && !url.includes('youtu.be')) {
        return alert('Harus link YouTube');
      }
      
      await db.collection('config').doc('global').update({
        backgroundUrl: url,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      
      overlayBg.classList.remove('show');
      alert('Background berhasil diset untuk semua user!');
    };

    btnBatalBg.onclick = () => overlayBg.classList.remove('show');
    overlayBg.onclick = (e) => { if (e.target === overlayBg) overlayBg.classList.remove('show'); };

    // === RUNNING TEXT ===
    btnRunningText.onclick = () => {
      if (currentRunningText) {
        if (confirm('Hapus running text untuk semua user?')) {
          db.collection('config').doc('global').update({ 
            runningText: null,
            textColor: null,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        }
      } else {
        overlayText.classList.add('show');
        inputRunningText.value = '';
        selectedColor = '#FFFFFF';
        toggleWarna.classList.remove('active');
        colorPalette.classList.remove('show');
        colorLabel.style.display = 'block';
        updateColorSelection();
        inputRunningText.focus();
      }
    };

    toggleWarna.onclick = () => {
      toggleWarna.classList.toggle('active');
      if (toggleWarna.classList.contains('active')) {
        colorLabel.style.display = 'none';
        colorPalette.classList.add('show');
      } else {
        colorLabel.style.display = 'block';
        colorPalette.classList.remove('show');
        selectedColor = '#FFFFFF';
      }
    };

    document.querySelectorAll('.color-box').forEach(box => {
      box.onclick = () => {
        selectedColor = box.dataset.color;
        updateColorSelection();
      };
    });

    function updateColorSelection() {
      document.querySelectorAll('.color-box').forEach(box => {
        box.classList.toggle('selected', box.dataset.color === selectedColor);
      });
    }

    btnKirimText.onclick = async () => {
      const text = inputRunningText.value.trim();
      if (!text) return alert('Isi teks dulu');
      if (text.length > 300) return alert('Maksimal 300 karakter');
      
      await db.collection('config').doc('global').update({
        runningText: text,
        textColor: selectedColor,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      
      overlayText.classList.remove('show');
      alert('Running text berhasil diset untuk semua user!');
    };

    btnBatalText.onclick = () => overlayText.classList.remove('show');
    overlayText.onclick = (e) => { if (e.target === overlayText) overlayText.classList.remove('show'); };

    // === VERIFIKASI AKUN ===
    btnVerifikasiAkun.onclick = () => {
      overlayVerifikasi.classList.add('show');
      inputSearchUser.value = '';
      userList.innerHTML = '';
      inputSearchUser.focus();
    };

    btnBatalVerifikasi.onclick = () => overlayVerifikasi.classList.remove('show');
    overlayVerifikasi.onclick = (e) => { if (e.target === overlayVerifikasi) overlayVerifikasi.classList.remove('show'); };

    btnCariUser.onclick = async () => {
      const keyword = inputSearchUser.value.trim().toLowerCase();
      if (!keyword) return alert('Ketik handle atau nama dulu');
      
      userList.innerHTML = '<div style="text-align:center;color:var(--abu);padding:20px">Mencari...</div>';
      
      const usersRef = db.collection('users');
      const q1 = usersRef.where('handle', '>=', keyword).where('handle', '<=', keyword + '\uf8ff').limit(10).get();
      const q2 = usersRef.where('namaAkun', '>=', keyword).where('namaAkun', '<=', keyword + '\uf8ff').limit(10).get();
      
      const [snap1, snap2] = await Promise.all([q1, q2]);
      const users = new Map();
      
      snap1.forEach(doc => users.set(doc.id, { id: doc.id, ...doc.data() }));
      snap2.forEach(doc => users.set(doc.id, { id: doc.id, ...doc.data() }));
      
      userList.innerHTML = '';
      if (users.size === 0) {
        userList.innerHTML = '<div style="text-align:center;color:var(--abu);padding:20px">Tidak ada user ditemukan</div>';
        return;
      }
      
      users.forEach(user => {
        userList.innerHTML += `
          <div class="user-item" onclick="bukaProfilAdmin('${user.id}')">
            <img src="${user.photoURL || defaultAvatar}" class="user-avatar">
            <div class="user-info">
              <div class="user-handle">@${user.handle || user.email?.split('@')[0] || 'username'}</div>
              <div class="user-name">${user.namaAkun || ''}</div>
            </div>
          </div>
        `;
      });
    };

    inputSearchUser.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') btnCariUser.click();
    });

    window.bukaProfilAdmin = (uid) => {
      window.open(`profil.html?uid=${uid}&admin=1`, '_blank');
    };
  </script>
</body>
      </html>
