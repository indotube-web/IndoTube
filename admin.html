<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - INDOTUBE</title>
  <style>
    :root {
      --merah: #FF0000;
      --abu-nonaktif: #555555;
      --hitam: #0F0F0F;
      --hitam-lembut: #1A1A1A;
      --abu-kotak: #272727;
      --putih: #FFFFFF;
      --abu: #AAAAAA;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { 
      background: var(--hitam); 
      color: var(--putih);
      min-height: 100vh;
    }
    
    /* HEADER PALING ATAS */
    .admin-header {
      background: var(--hitam-lembut);
      border-bottom: 1px solid #333;
      padding: 16px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    
    .admin-header h1 {
      font-size: 20px;
      margin-bottom: 16px;
    }
    
    /* BAGIAN LAYAR DEPAN - PALING ATAS */
    .task-section {
      background: var(--abu-kotak);
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    
    .task-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--abu);
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    
    #btnLayarDepan {
      background: var(--merah);
      color: var(--putih);
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      transition: .2s;
    }
    #btnLayarDepan:hover { opacity: .8; }
    
    #btnLayarDepan.active {
      background: var(--abu-nonaktif);
    }
    
    .status {
      margin-top: 8px;
      color: var(--abu);
      font-size: 13px;
      word-break: break-all;
    }

    /* KONTEN UTAMA BUAT FITUR LAIN NANTI */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px 16px;
    }
    
    .placeholder {
      background: var(--abu-kotak);
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      color: var(--abu);
      border: 2px dashed #333;
    }

    /* POPUP */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .overlay.show { display: flex; }
    
    .popup {
      background: var(--hitam-lembut);
      padding: 24px;
      border-radius: 16px;
      border: 1px solid #333;
      width: 90%;
      max-width: 400px;
    }
    .popup h3 {
      margin-bottom: 16px;
      font-size: 18px;
    }
    .popup input {
      width: 100%;
      background: var(--hitam);
      border: 1px solid #333;
      padding: 12px;
      color: var(--putih);
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .popup-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .popup-actions button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-kirim {
      background: var(--merah);
      color: var(--putih);
    }
    .btn-batal {
      background: #333;
      color: var(--putih);
    }
  </style>
</head>
<body>
  <!-- HEADER PALING ATAS - LAYAR DEPAN DITARO DISINI -->
  <header class="admin-header">
    <h1>Panel Admin INDOTUBE</h1>
    
    <!-- TASK: LAYAR DEPAN -->
    <div class="task-section">
      <div class="task-title">Background Global</div>
      <button id="btnLayarDepan">Layar Depan</button>
      <div class="status" id="statusText">Background kosong</div>
    </div>
    
    <!-- NANTI TASK LAIN TINGGAL COPY .task-section DIBAWAH INI -->
    
  </header>

  <!-- KONTEN UTAMA BUAT FITUR LAIN -->
  <main class="container">
    <div class="placeholder">
      Area kerja admin.<br>
      Tambahin fitur lain disini nanti.
    </div>
  </main>

  <!-- POPUP INPUT YOUTUBE -->
  <div class="overlay" id="overlay">
    <div class="popup">
      <h3>Set Background Index</h3>
      <input type="text" id="inputYoutube" placeholder="Paste link YouTube: https://youtu.be/...">
      <div class="popup-actions">
        <button class="btn-batal" id="btnBatal">Batal</button>
        <button class="btn-kirim" id="btnKirim">Kirim</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA-2eXiVvN43dmcNlMx9hQ4wOv8Kjdjfw8",
      authDomain: "indotube-c7eb4.firebaseapp.com",
      projectId: "indotube-c7eb4",
      storageBucket: "indotube-c7eb4.firebasestorage.app",
      messagingSenderId: "568433040739",
      appId: "1:568433040739:web:c9b32f3d807b07fa5f4756"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const btnLayarDepan = document.getElementById('btnLayarDepan');
    const overlay = document.getElementById('overlay');
    const inputYoutube = document.getElementById('inputYoutube');
    const btnKirim = document.getElementById('btnKirim');
    const btnBatal = document.getElementById('btnBatal');
    const statusText = document.getElementById('statusText');

    let currentBg = null;

    db.collection('config').doc('global').onSnapshot(doc => {
      currentBg = doc.data()?.backgroundUrl || null;
      updateButton();
    });

    function updateButton() {
      if (currentBg) {
        btnLayarDepan.classList.add('active');
        btnLayarDepan.textContent = 'Hapus Background';
        statusText.textContent = 'Aktif: ' + currentBg;
      } else {
        btnLayarDepan.classList.remove('active');
        btnLayarDepan.textContent = 'Layar Depan';
        statusText.textContent = 'Background kosong';
      }
    }

    btnLayarDepan.onclick = () => {
      if (currentBg) {
        if (confirm('Hapus background untuk semua user?')) {
          db.collection('config').doc('global').set({ 
            backgroundUrl: null,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        }
      } else {
        overlay.classList.add('show');
        inputYoutube.value = '';
        inputYoutube.focus();
      }
    };

    btnKirim.onclick = async () => {
      const url = inputYoutube.value.trim();
      if (!url) return alert('Isi link YouTube dulu');
      if (!url.includes('youtube') && !url.includes('youtu.be')) {
        return alert('Harus link YouTube');
      }
      
      await db.collection('config').doc('global').set({
        backgroundUrl: url,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      
      overlay.classList.remove('show');
      alert('Background berhasil diset untuk semua user!');
    };

    btnBatal.onclick = () => {
      overlay.classList.remove('show');
    };

    overlay.onclick = (e) => {
      if (e.target === overlay) overlay.classList.remove('show');
    };
  </script>
</body>
  </html>
