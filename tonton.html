<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tonton - INDOTUBE</title>
  <style>
    :root {
      --merah: #FF0000;
      --hitam: #0F0F0F;
      --putih: #FFFFFF;
      --abu: #AAAAAA;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: var(--hitam); color: var(--putih); }

  .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      padding: 0 16px;
      border-bottom: 1px solid #272727;
      position: sticky;
      top: 0;
      background: var(--hitam);
      z-index: 10;
    }
  .header-left {
      display: flex;
      align-items: center;
    }
  .btn-back {
      background: none;
      border: none;
      cursor: pointer;
      margin-right: 16px;
    }
  .btn-back svg {
      width: 24px;
      height: 24px;
      fill: var(--putih);
    }
  .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--merah);
    }
  .btn-fullscreen {
      background: #272727;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  .btn-fullscreen svg {
      width: 20px;
      height: 20px;
      fill: var(--putih);
    }

  .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px;
    }
  .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }
  .video-wrapper.fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      border-radius: 0;
      aspect-ratio: unset;
    }
  .video-wrapper.rotate {
      transform: rotate(90deg);
      transform-origin: center center;
      width: 100vh;
      height: 100vw;
    }
  .video-player {
      width: 100%;
      height: 100%;
    }
  .video-player iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  .btn-rotate {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
  .btn-rotate.show {
      display: flex;
    }
  .btn-rotate svg {
      width: 24px;
      height: 24px;
      fill: var(--putih);
    }

  .video-judul {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 8px;
    }
  .video-stats {
      font-size: 14px;
      color: var(--abu);
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #272727;
    }
  .channel-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
  .channel-pic {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }
  .channel-name {
      font-size: 16px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <button class="btn-back" onclick="history.back()">
        <svg viewBox="0 0 24 24">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
      </button>
      <div class="logo">INDOTUBE</div>
    </div>
    <button class="btn-fullscreen" id="btnFullscreen" title="Layar Penuh">
      <svg viewBox="0 0 24 24">
        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
      </svg>
    </button>
  </header>

  <main class="container">
    <div class="video-wrapper" id="videoWrapper">
      <div class="video-player" id="player"></div>
      <button class="btn-rotate" id="btnRotate" title="Putar 90°">
        <svg viewBox="0 0 24 24">
          <path d="M15.55 5.55L11 1v3.07C7.06 4.56 4 7.92 4 12s3.05 7.44 7 7.93v-2.02c-2.84-.48-5-2.94-5-5.91s2.16-5.43 5-5.91V10l4.55-4.45zM19.93 11c-.17-1.39-.72-2.73-1.62-3.89l-1.42 1.42c.54.75.88 1.6 1.02 2.47h2.02zM13 17.9v2.02c1.39-.17 2.74-.71 3.9-1.61l-1.44-1.44c-.75.54-1.59.89-2.46 1.03zm3.89-2.61c.2-.73.33-1.49.33-2.29s-.13-1.56-.33-2.3l1.45-1.45c.39 1.14.6 2.36.6 3.75s-.21 2.61-.6 3.75l-1.45-1.46z"/>
        </svg>
      </button>
    </div>
    <div class="video-judul" id="judul">Memuat...</div>
    <div class="video-stats" id="stats"></div>
    <div class="channel-info">
      <img src="" class="channel-pic" id="channelPic">
      <div class="channel-name" id="channelName"></div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA-2eXiVvN43dmcNlMx9hQ4wOv8Kjdjfw8",
      authDomain: "indotube-c7eb4.firebaseapp.com",
      projectId: "indotube-c7eb4",
      storageBucket: "indotube-c7eb4.firebasestorage.app",
      messagingSenderId: "568433040739",
      appId: "1:568433040739:web:c9b32f3d807b07fa5f4756"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(location.search);
    const videoId = urlParams.get('id');
    const videoWrapper = document.getElementById('videoWrapper');
    const btnFullscreen = document.getElementById('btnFullscreen');
    const btnRotate = document.getElementById('btnRotate');
    let isRotated = false;

    if (!videoId) {
      location.href = 'beranda.html';
    }

    function formatAngka(num) {
      if (num >= 1000000000) return (num/1000000000).toFixed(1).replace('.0','') + ' Milyar';
      if (num >= 1000000) return (num/1000000).toFixed(1).replace('.0','') + 'jt';
      if (num >= 10000) return (num/1000).toFixed(1).replace('.0','') + 'rb';
      return num.toString();
    }

    function getYoutubeId(url) {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11)? match[2] : null;
    }

    // FULLSCREEN TOGGLE
    btnFullscreen.onclick = () => {
      if (!document.fullscreenElement) {
        videoWrapper.requestFullscreen();
        videoWrapper.classList.add('fullscreen');
        btnRotate.classList.add('show');
      } else {
        document.exitFullscreen();
        videoWrapper.classList.remove('fullscreen', 'rotate');
        btnRotate.classList.remove('show');
        isRotated = false;
      }
    };

    // ROTATE 90 DERAJAT SEARAH JARUM JAM
    btnRotate.onclick = () => {
      isRotated =!isRotated;
      if (isRotated) {
        videoWrapper.classList.add('rotate');
      } else {
        videoWrapper.classList.remove('rotate');
      }
    };

    // EXIT FULLSCREEN EVENT
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        videoWrapper.classList.remove('fullscreen', 'rotate');
        btnRotate.classList.remove('show');
        isRotated = false;
      }
    });

    async function loadVideo() {
      const doc = await db.collection('videos').doc(videoId).get();
      if (!doc.exists) {
        alert('Video tidak ditemukan');
        location.href = 'beranda.html';
        return;
      }

      const v = doc.data();
      const ytId = getYoutubeId(v.link);

      document.getElementById('player').innerHTML = `
        <iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
        </iframe>
      `;

      document.getElementById('judul').textContent = v.judul;
      document.getElementById('stats').textContent = `${formatAngka(v.views || 0)} x ditonton`;
      document.getElementById('channelName').textContent = v.namaAkun;

      try {
        const userDoc = await db.collection('users').doc(v.userId).get();
        if (userDoc.exists && userDoc.data().photoURL) {
          document.getElementById('channelPic').src = userDoc.data().photoURL;
        } else {
          document.getElementById('channelPic').src = 'https://ui-avatars.com/api/?name=' + (v.namaAkun || 'User') + '&background=333&color=fff';
        }
      } catch(e) {
        document.getElementById('channelPic').src = 'https://ui-avatars.com/api/?name=' + (v.namaAkun || 'User') + '&background=333&color=fff';
      }

      db.collection('videos').doc(videoId).update({
        views: firebase.firestore.FieldValue.increment(1)
      });
    }

    loadVideo();
  </script>
</body>
  </html>
