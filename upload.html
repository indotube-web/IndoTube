<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Video - INDOTUBE</title>
  <style>
    :root {
      --red: #FF0000;
      --yellow: #FFD700;
      --orange: #FF6600;
      --black: #0F0F0F;
      --black-soft: #1A1A1A;
      --black-light: #272727;
      --white: #FFFFFF;
      --text: #F1F1F1;
      --gray: #AAAAAA;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body {
      background: var(--black); color: var(--text);
      display: flex; flex-direction: column; min-height: 100vh;
    }
    
    /* HEADER ATAS */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 56px; background: var(--black);
      border-bottom: 1px solid var(--black-light);
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .logo-icon {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 28px; height: 28px; }
    .logo-text {
      font-size: 22px; font-weight: 700; letter-spacing: -1px;
      color: var(--yellow);
    }
    
    /* FORM CONTAINER */
    .container {
      flex: 1; width: 100%; max-width: 500px; margin: 0 auto;
      padding: 32px 16px 80px;
    }
    .form-title {
      font-size: 20px; font-weight: 700; margin-bottom: 24px;
      color: var(--white); border-left: 4px solid var(--red); padding-left: 8px;
    }
    
    .form-group { margin-bottom: 20px; }
    .form-label { font-size: 13px; color: var(--gray); margin-bottom: 6px; display: block; font-weight: 700; }
    .input-field {
      width: 100%; background: var(--black-soft);
      border: 1px solid var(--black-light); border-radius: 8px;
      padding: 12px; color: var(--text); font-size: 14px; outline: none;
    }
    .input-field:focus { border-color: var(--red); }
    textarea.input-field { resize: vertical; min-height: 80px; }
    
    .btn-submit {
      width: 100%; background: var(--red); color: var(--white);
      border: none; padding: 14px; border-radius: 24px;
      font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 12px;
      transition: opacity 0.2s;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { background: var(--black-light); color: var(--gray); cursor: not-allowed; }

    /* PREVIEW BOX */
    .preview-box {
      width: 100%; aspect-ratio: 16/9; background: var(--black-soft);
      border: 1px dashed var(--black-light); border-radius: 8px;
      margin-bottom: 20px; display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .preview-placeholder { font-size: 13px; color: var(--gray); text-align: center; padding: 16px; }

    /* NAVIGASI BAWAH */
    .nav-bottom {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 48px;
      background: var(--black); border-top: 1px solid var(--black-light);
      display: flex; justify-content: space-around; align-items: center; z-index: 100;
    }
    .nav-item {
      background: none; border: none; color: var(--gray); cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .nav-item-active { color: var(--white); }
    .nav-item svg { width: 22px; height: 22px; fill: currentColor; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left" id="backHome">
      <div class="logo-icon">
        <svg viewBox="0 0 32 32">
          <path d="M6 14 L12 20 L26 8" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="rotate(-90 16 16)"/>
        </svg>
      </div>
      <span class="logo-text">UPLOAD</span>
    </div>
  </header>

  <main class="container">
    <div class="form-title">Bagikan Video Baru</div>
    
    <div class="preview-box" id="previewBox">
      <div class="preview-placeholder" id="previewPlaceholder">Sistem akan memuat thumbnail otomatis setelah link YouTube dimasukkan</div>
      <img src="" class="preview-img" id="previewImg" alt="Pratinjau Thumbnail">
    </div>

    <div class="form-group">
      <label class="form-label">Link Video YouTube</label>
      <input type="text" class="input-field" id="embedUrl" placeholder="Contoh: https://www.youtube.com/watch?v=dQw4w9WgXcQ">
    </div>
    
    <div class="form-group">
      <label class="form-label">Judul Video</label>
      <input type="text" class="input-field" id="videoTitle" placeholder="Masukkan judul video yang menarik" maxlength="80">
    </div>
    
    <button class="btn-submit" id="btnPublish">Publikasikan Video</button>
  </main>

  <nav class="nav-bottom">
    <button class="nav-item" id="navHome">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </button>
    <button class="nav-item nav-item-active">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </button>
  </nav>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // CONFIG ASLI MILIKMU
    const firebaseConfig = {
      apiKey: "AIzaSyA-2eXiVvN43dmcNlMx9hQ4wOv8Kjdjfw8",
      authDomain: "indotube-c7eb4.firebaseapp.com",
      projectId: "indotube-c7eb4",
      storageBucket: "indotube-c7eb4.firebasestorage.app",
      messagingSenderId: "568433040739",
      appId: "1:568433040739:web:c9b32f3d807b07fa5f4756"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let activeUser = null;
    let extractedVideoId = null;

    // WAJIB LOGIN
    onAuthStateChanged(auth, (user) => {
      if (user) {
        activeUser = user;
      } else {
        location.href = 'index.html';
      }
    });

    const embedUrlInput = document.getElementById('embedUrl');
    const previewBox = document.getElementById('previewBox');
    const previewPlaceholder = document.getElementById('previewPlaceholder');
    const previewImg = document.getElementById('previewImg');
    const btnPublish = document.getElementById('btnPublish');

    // FUNGSI EKSTRAK ID YOUTUBE (Mendukung link web biasa, mobile, dan shorts)
    function extractYouTubeId(url) {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    // DETEKSI MOMEN USER PASTE/KETIK LINK
    embedUrlInput.addEventListener('input', () => {
      const urlValue = embedUrlInput.value.trim();
      extractedVideoId = extractYouTubeId(urlValue);

      if (extractedVideoId) {
        // Berhasil tebak link YouTube, langsung munculkan live preview gambarnya
        const thumbUrl = `https://img.youtube.com/vi/${extractedVideoId}/hqdefault.jpg`;
        previewImg.src = thumbUrl;
        previewImg.style.display = 'block';
        previewPlaceholder.style.display = 'none';
      } else {
        // Link tidak valid atau dikosongkan kembali
        previewImg.style.display = 'none';
        previewPlaceholder.style.display = 'block';
        previewPlaceholder.textContent = urlValue ? "Link tidak dikenali. Pastikan memasukkan link YouTube yang valid!" : "Sistem akan memuat thumbnail otomatis setelah link YouTube dimasukkan";
      }
    });

    // KIRIM DATA KE FIRESTORE
    btnPublish.addEventListener('click', async () => {
      const titleVal = document.getElementById('videoTitle').value.trim();
      
      if (!extractedVideoId) {
        alert('Masukkan link video YouTube yang valid terlebih dahulu!');
        return;
      }
      if (!titleVal) {
        alert('Judul video tidak boleh kosong!');
        return;
      }

      btnPublish.disabled = true;
      btnPublish.textContent = "Sedang Mengupload...";

      try {
        // Merakit format data final siap pakai
        const finalEmbedUrl = `https://www.youtube.com/embed/${extractedVideoId}`;
        const finalThumbUrl = `https://img.youtube.com/vi/${extractedVideoId}/hqdefault.jpg`;

        // Proses simpan ke Firestore (Koleksi 'videos' akan terbuat otomatis jika belum ada)
        await addDoc(collection(db, "videos"), {
          title: titleVal,
          url: finalEmbedUrl,
          thumb: finalThumbUrl,
          views: 0,
          authorId: activeUser.uid,
          authorName: activeUser.displayName || "Kreator Indotube",
          authorPic: activeUser.photoURL || "https://picsum.photos/seed/user/200/200",
          createdAt: serverTimestamp()
        });

        alert('Video berhasil dipublikasikan!');
        location.href = 'beranda.html'; // Tendang kembali ke beranda untuk melihat hasilnya

      } catch (error) {
        console.error("Gagal menyimpan video:", error);
        alert("Terjadi kesalahan server: " + error.message);
        btnPublish.disabled = false;
        btnPublish.textContent = "Publikasikan Video";
      }
    });

    // NAVIGASI LINK
    document.getElementById('backHome').addEventListener('click', () => location.href = 'beranda.html');
    document.getElementById('navHome').addEventListener('click', () => location.href = 'beranda.html');
  </script>
</body>
</html>
