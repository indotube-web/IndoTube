<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload - INDOTUBE</title>
  <style>
    :root {
      --red: #FF0000;
      --yellow: #FFD700;
      --orange: #FF6600;
      --black: #0F0F0F;
      --black-soft: #1A1A1A;
      --black-light: #272727;
      --white: #FFFFFF;
      --text: #F1F1F1;
      --gray: #AAAAAA;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: var(--black); color: var(--text); }
    
    .header {
      display: flex; align-items: center;
      padding: 0 16px; height: 56px; background: var(--black);
      border-bottom: 1px solid var(--black-light);
    }
    .header-left { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .logo-icon {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 28px; height: 28px; }
    .logo-text {
      font-size: 22px; font-weight: 700; letter-spacing: -1px;
      color: var(--yellow);
    }
    
    .container {
      max-width: 720px; margin: 0 auto; padding: 32px 16px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .input-field {
      width: 100%; background: var(--black-soft); 
      border: 1px solid var(--black-light); border-radius: 8px;
      padding: 12px 16px; color: var(--text); font-size: 16px; outline: none;
    }
    .input-field:focus { border-color: var(--red); }
    .input-field::placeholder { color: var(--gray); }
    .input-field.error { border-color: var(--red); }
    .char-count {
      font-size: 12px; color: var(--gray); text-align: right; margin-top: 4px;
    }
    .char-count.error { color: var(--red); }
    
    .btn-group {
      display: flex; gap: 12px; margin-top: 28px; justify-content: flex-end;
    }
    .btn {
      border: none; padding: 10px 24px; border-radius: 18px; 
      cursor: pointer; font-size: 14px; font-weight: 500;
    }
    .btn-kirim {
      background: var(--red); color: var(--white); display: none;
    }
    .btn-kirim:hover { background: #CC0000; }
    .btn-batal {
      background: var(--black-light); color: var(--text);
    }
    .btn-batal:hover { background: #3F3F3F; }

    @media (max-width: 768px) {
      .container { padding: 24px 16px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left" id="backHome">
      <div class="logo-icon">
        <svg viewBox="0 0 32 32">
          <path d="M6 14 L12 20 L26 8" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="rotate(-90 16 16)"/>
        </svg>
      </div>
      <span class="logo-text">Embed Video</span>
    </div>
  </header>

  <main class="container">
    <div class="form-group">
      <input type="text" class="input-field" id="embedUrl" placeholder="url">
    </div>
    
    <div class="form-group">
      <input type="text" class="input-field" id="judulVideo" placeholder="judul" maxlength="100">
      <div class="char-count" id="charCount">0 / 100</div>
    </div>
    
    <div class="btn-group">
      <button class="btn btn-batal" id="btnBatal">Batal</button>
      <button class="btn btn-kirim" id="btnKirim">Kirim</button>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA-2eXiVvN43dmcNlMx9hQ4wOv8Kjdjfw8",
      authDomain: "indotube-c7eb4.firebaseapp.com",
      projectId: "indotube-c7eb4",
      storageBucket: "indotube-c7eb4.firebasestorage.app",
      messagingSenderId: "568433040739",
      appId: "1:568433040739:web:c9b32f3d807b07fa5f4756"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserData = null;

    // CEK PROTEKSI LOGIN
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // Tarik detail nama & pic terbaru dari Firestore
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
          currentUserData = { uid: user.uid, ...userDoc.data() };
        } else {
          currentUserData = { uid: user.uid, nama: user.displayName, pic: user.photoURL };
        }
      } else {
        location.href = 'index.html';
      }
    });

    const embedUrl = document.getElementById('embedUrl');
    const judulVideo = document.getElementById('judulVideo');
    const btnKirim = document.getElementById('btnKirim');
    const charCount = document.getElementById('charCount');

    document.getElementById('backHome').addEventListener('click', () => {
      location.href = 'beranda.html';
    });

    function isValidUrl(string) {
      try {
        new URL(string);
        return true;
      } catch (_) {
        return false;  
      }
    }

    // FUNGSI EKSTRAKSI ID YOUTUBE
    function getYouTubeId(url) {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    function cekForm() {
      const urlValid = embedUrl.value.trim() !== '' && isValidUrl(embedUrl.value.trim());
      const judulValid = judulVideo.value.trim() !== '' && judulVideo.value.length <= 100;
      
      embedUrl.classList.toggle('error', embedUrl.value.trim() !== '' && !isValidUrl(embedUrl.value.trim()));
      judulVideo.classList.toggle('error', judulVideo.value.length > 100);
      
      charCount.textContent = `${judulVideo.value.length} / 100`;
      charCount.classList.toggle('error', judulVideo.value.length > 100);

      if (urlValid && judulValid) {
        btnKirim.style.display = 'block';
      } else {
        btnKirim.style.display = 'none';
      }
    }

    embedUrl.addEventListener('input', cekForm);
    judulVideo.addEventListener('input', cekForm);

    // KIRIM DATA REAL KE FIRESTORE
    btnKirim.addEventListener('click', async () => {
      const urlInput = embedUrl.value.trim();
      const judul = judulVideo.value.trim();
      const ytId = getYouTubeId(urlInput);

      if (!ytId) {
        alert("Link salah! Masukkan URL Video YouTube yang valid.");
        embedUrl.classList.add('error');
        return;
      }

      btnKirim.disabled = true;
      btnKirim.textContent = "Mengirim...";

      try {
        // Konversi URL mentah jadi URL embed aman untuk iframe nonton
        const finalEmbedUrl = `https://www.youtube.com/embed/${ytId}`;
        const thumbnail = `https://img.youtube.com/vi/${ytId}/mqdefault.jpg`;

        await addDoc(collection(db, "videos"), {
          title: judul,
          url: finalEmbedUrl,
          thumb: thumbnail,
          authorId: currentUserData.uid,
          authorName: currentUserData.nama,
          authorPic: currentUserData.pic || "https://picsum.photos/seed/user/100/100",
          views: 0,
          createdAt: serverTimestamp()
        });

        alert('Video berhasil dipublikasikan!');
        location.href = 'beranda.html';

      } catch (error) {
        alert("Gagal mengupload video: " + error.message);
        btnKirim.disabled = false;
        btnKirim.textContent = "Kirim";
      }
    });

    document.getElementById('btnBatal').addEventListener('click', () => {
      location.href = 'beranda.html';
    });
  </script>
</body>
</html>
